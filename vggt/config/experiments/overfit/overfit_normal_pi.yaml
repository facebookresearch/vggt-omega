# @package _global_
# Extends overfit_base.yaml with normal_loss_pi gradient loss for point and preg

defaults:
  - /experiments/overfit/overfit_base

#################
# Submitit Configuration
#################
submitit:
  name: "overfit_normal_pi"

#################
# Loss Configuration Override
# Use normal_loss_pi with scales=1 for point and preg losses
#################
trainer:
  loss:
    point:
      gradient_loss_fn: "normal_pi"
      gradient_loss_scales: 1
    preg:
      gradient_loss_fn: "normal_pi"
      gradient_loss_scales: 1

