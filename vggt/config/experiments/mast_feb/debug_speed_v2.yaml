# @package _global_
#
# Debug configuration for testing frame-level parallel data loading (V2)
#
# This configuration uses the new datasets_v2 system where:
# - Each DataLoader worker loads individual frames (not entire sequences)
# - SequenceAwareBatchSampler groups frames from the same sequence
# - SequenceCollator assembles frames and applies per-scene operations
#
# Expected improvements:
# - Better I/O parallelization (N workers can load N frames simultaneously)
# - Simpler code (no ThreadPoolExecutor complexity)
# - More consistent loading times


defaults:
  - /experiments/base/base_train
  - /experiments/models/vggt_3b@trainer.model
  # NOTE: You'll need to create dataset configs that use UnifiedFrameDataset
  # For now, we'll define inline below


#################

submitit:
  name: "debug_speed_v2"
  timeout_min: 8000
  cpus_per_task: 14
  account: "fair_amaia_cw_scale"
  qos: "scale"
  mem_gb: 0
  use_cluster: True
  partition: learn


# Settings
use_spawn: True
debug: False
batch_size: 4
fix_img_num: 8
img_size: 256
patch_size: 16
num_workers: 12
load_track: False
load_similarity: True
track_num: 512
shuffle: True
seed_value: 96
max_img_per_gpu: 88

base_lr: 1e-4
min_lr: 2e-7
patch_base_lr: 5e-7
patch_min_lr: 1e-8
dyna_ratio: 2.0
aggregator_register_num: 8

launcher:
  gpus_per_node: 8
  num_nodes: 1


#################

trainer:
  cuda:
    allow_tf32: False
    cudnn_deterministic: False
    cudnn_benchmark: False

  accum_steps: 1
  visual_viser: False
  val_epoch_freq: 5
  seed_value: ${seed_value}

  max_epochs: 100
  limit_train_batches: 1000
  limit_val_batches: 100

  distributed:
    backend: nccl
    find_unused_parameters: False

  optim:
    optimizer:
      _target_: torch.optim.AdamW
      lr: ${base_lr}
      weight_decay: 0.05

    amp:
      enabled: True

    gradient_clip:
      _target_: vggt.utils.gradient_clip.GradientClipper
      configs:
        - module_name: ["patch_embed"]
          max_norm: 0.1
          norm_type: 2
        - module_name: ["aggregator", "head"]
          max_norm: 1.0
          norm_type: 2

    options:
      lr:
        - scheduler:
            _target_: fvcore.common.param_scheduler.CompositeParamScheduler
            schedulers:
              - _target_: fvcore.common.param_scheduler.LinearParamScheduler
                start_value: ${min_lr}
                end_value: ${base_lr}
              - _target_: fvcore.common.param_scheduler.CosineParamScheduler
                start_value: ${base_lr}
                end_value: ${min_lr}
            lengths: [0.05, 0.95]
            interval_scaling: ['rescaled', 'rescaled']
        - scheduler:
            _target_: fvcore.common.param_scheduler.CompositeParamScheduler
            schedulers:
              - _target_: fvcore.common.param_scheduler.LinearParamScheduler
                start_value: ${patch_min_lr}
                end_value: ${patch_base_lr}
              - _target_: fvcore.common.param_scheduler.CosineParamScheduler
                start_value: ${patch_base_lr}
                end_value: ${patch_min_lr}
            lengths: [0.05, 0.95]
            interval_scaling: ['rescaled', 'rescaled']
          param_names:
            - '*patch_embed*'
      weight_decay:
        - scheduler:
            _target_: fvcore.common.param_scheduler.ConstantParamScheduler
            value: 0.05


  #########################################################
  # Data Configuration - Using V2 frame-level loading
  #########################################################
  data:
    train:
      # Use the new DynamicTorchDatasetV2
      _target_: vggt.data.datasets_v2.DynamicTorchDatasetV2
      num_workers: ${num_workers}
      max_img_per_gpu: ${max_img_per_gpu}
      use_spawn: ${use_spawn}
      dyna_ratio: ${dyna_ratio}
      sync_image_num: False
      persistent_workers: False
      seed: ${seed_value}
      shuffle: ${shuffle}
      pin_memory: True
      
      common_config:
        sample_dict: "s1"
        ratio_dict: "s1"
        img_size: ${img_size}
        patch_size: ${patch_size}
        debug: ${debug}
        training: True
        repeat_batch: False
        img_nums: [2, 32]
        aug_principal_point: True
        random_rotation_ratio: 0.01
        random_patch_mask_size: 128
        random_patch_mask_ratio: 0.05
        load_track: ${load_track}
        track_num: ${track_num}
        load_similarity: ${load_similarity}
        load_ray_map: True
        # Frame-level loading doesn't need thread_io_worker_num
        # thread_io_worker_num: -1
        rescale: True
        rescale_aug: True
        landscape_check: True
        inside_random: True
        get_nearby: True
        allow_duplicate_img: True
        augs:
          aspects: [0.6, 2.0]
          scales: [0.8, 1.0]
          cojitter: True
          cojitter_ratio: 0.8
          color_jitter:
            brightness: 0.85
            contrast: 0.75
            saturation: 0.5
            hue: 0.1
            p: 0.9
          gray_scale: 0.1
          gau_blur: 0.1
      
      # Use ComposedFrameDataset to combine multiple datasets
      dataset:
        _target_: vggt.data.datasets_v2.ComposedFrameDataset
        dataset_configs:
          # NOTE: To fully match debug_speed.yaml, we would need to add all datasets
          # from dataset_mix.yaml here, converting them to UnifiedFrameDataset.
          # Below are examples for Apollo and Eden.
          
          apollo:
            _target_: vggt.data.datasets_v2.UnifiedFrameDataset
            UNIFIED_DIR: /checkpoint/repligen/jianyuan/data/apollo/
            dataset_prefix: "_apollo"
            step_range: 64
            max_depth: 256
            len_dataset: 183
            max_interval: 32
            
          eden:
            _target_: vggt.data.datasets_v2.UnifiedFrameDataset
            UNIFIED_DIR: "/checkpoint/repligen/jianyuan/data/eden/"
            dataset_prefix: "eden"
            step_range: 8
            jump_prob: 0.25
            sample_by_index: False
            max_depth: -1
            max_percentile: 99
            min_percentile: 1

    val:
      _target_: vggt.data.datasets_v2.DynamicTorchDatasetV2
      num_workers: ${num_workers}
      max_img_per_gpu: ${max_img_per_gpu}
      sync_image_num: False
      use_spawn: ${use_spawn}
      shuffle: False
      pin_memory: True
      seed: ${seed_value}
      
      common_config:
        sample_dict: "s1"
        ratio_dict: "s1"
        img_size: ${img_size}
        patch_size: ${patch_size}
        debug: ${debug}
        training: False
        load_track: ${load_track}
        track_num: ${track_num}
        load_similarity: ${load_similarity}
        load_ray_map: True
        rescale: True
        rescale_aug: False
        landscape_check: True
        inside_random: False
        get_nearby: True
        allow_duplicate_img: True
        img_nums: [2, 32]
        aug_principal_point: False
        random_rotation_ratio: -1
        random_patch_mask_size: -1
        random_patch_mask_ratio: -1
        augs:
          aspects: [0.6, 2.0]
          scales: null
          cojitter: False
          cojitter_ratio: 0.0
          color_jitter: null
          gray_scale: 0.0
          gau_blur: 0.0
      
      dataset:
        _target_: vggt.data.datasets_v2.ComposedFrameDataset
        dataset_configs:
          eden:
            _target_: vggt.data.datasets_v2.UnifiedFrameDataset
            UNIFIED_DIR: "/checkpoint/repligen/jianyuan/data/eden/"
            dataset_prefix: "eden"
            step_range: 8


  #########################################################
  # Loss Configuration
  #########################################################
  loss:
    _target_: vggt.losses.loss.MultitaskLoss
    unproject_depth_to_points: True
    use_cam2world: False
    normalize_predictions: True
    verbose: False
    camera:
      weight: 5.0
      loss_type: "l1"
      weight_trans: 5.0
      pose_encoding_type: "absT_quaR_FoV"
    depth:
      weight: 1.0
      gradient_loss_fn: "grad"
      valid_range: 0.98
      rel_loss_weight: 1.0
      loss_type: "l1"
      decouple_conf: True
    point:
      weight: 1.0
      gradient_loss_fn: "grad"
      valid_range: 0.98
      rel_loss_weight: 1.0
      loss_type: "l1"
      decouple_conf: True
    ray:
      weight: 0.5
      gradient_loss_fn: null
      rel_loss_weight: -1.0
      loss_type: "l1"
      decouple_conf: False
    match:
      weight: 0.1
      temperature_pos: 0.5
      temperature_neg: 2.0
      m_neg: -0.2
      negative_weight: 0.1
    track: null


  #########################################################
  # Logging Configuration
  #########################################################
  logging:
    log_freq: 1
    log_visuals: False
    scalar_keys_to_log:
      train:
        keys_to_log:
          - loss_depth
          - loss_conf_depth
          - loss_reg_depth
          - loss_grad_depth
          - loss_reg_relative_depth
          - d1
          - d2
          - d3
          - abs_rel
          - sq_rel
          - rmse
          - rmse_log
          - loss_point
          - loss_conf_point
          - loss_reg_point
          - loss_grad_point
          - loss_reg_relative_point
          - loss_ray
          - loss_camera
          - loss_T
          - loss_R
          - loss_FL
          - loss_PP
          - Rac_5
          - Tac_5
          - Rac_15
          - Tac_15
          - Auc_30
          - Auc_10
          - Auc_5
          - Auc_3
          - loss_patch_bce
          - loss_patch_pos
          - loss_patch_neg
          - num_pos_pairs
          - num_neg_pairs
          - depth_collapse_reg
          - mean_depth_raw
      val:
        keys_to_log:
          - loss_depth
          - loss_conf_depth
          - loss_reg_depth
          - loss_grad_depth
          - loss_reg_relative_depth
          - d1
          - d2
          - d3
          - abs_rel
          - sq_rel
          - rmse
          - rmse_log
          - loss_point
          - loss_conf_point
          - loss_reg_point
          - loss_grad_point
          - loss_reg_relative_point
          - loss_ray
          - loss_camera
          - loss_T
          - loss_R
          - loss_FL
          - loss_PP
          - Rac_5
          - Tac_5
          - Rac_15
          - Tac_15
          - Auc_30
          - Auc_10
          - Auc_5
          - Auc_3
          - loss_patch_bce
          - loss_patch_pos
          - loss_patch_neg
          - num_pos_pairs
          - num_neg_pairs
          - depth_collapse_reg
          - mean_depth_raw

