# @package _global_


defaults:
  - /experiments/base/base_train
  - /experiments/base/base_fsdp
  - /experiments/mast/dataset_mix_v3
  #
  # Model
  #
  - /experiments/models/vggt_10b@trainer.model


#################







# Single Depth

use_spawn: True # set for debug. For training, set to True

#
debug: False
batch_size: 4 # 16    # TODO
fix_img_num: 8 # 2
img_size: 512
patch_size: 16
num_workers: 6
# load_track: True
load_track: False
load_similarity: True
track_num: 512
shuffle: True
seed_value: 40096
max_img_per_gpu: 88

base_lr: 5e-5
min_lr: 5e-7
patch_base_lr: 5e-6
patch_min_lr: 1e-7
dyna_ratio: 1.0 # 1.0
aggregator_register_num: 8

submitit:
  name: "10b_d016"
  timeout_min: 8000
  cpus_per_task: 12
  # account: "fair_amaia_cw_scale"
  # qos: "scale"
  account: "fair_amaia_cw_explore"
  qos: "explore"
  mem_gb: 0
  use_cluster: True
  partition: learn


launcher:
  gpus_per_node: 8 # 8
  num_nodes: 32 # 8

#################

trainer:
  model:
    DEPTH_HEAD:
      conf_activation: softplus_0.1_10
      disable_conf: True

  cuda:
    allow_tf32: False
    cudnn_deterministic: False
    cudnn_benchmark: False

  #########################################################

  #########################################################

  # checkpoint:
  #   model_weight_initializer:
  #     _partial_: True
  #     _target_: omnivision.model.checkpoint_utils.load_state_dict_into_model
  #     strict: False
  #     state_dict:
  #       _target_: omnivision.model.checkpoint_utils.load_multiple_checkpoints_and_apply_kernels
  #       checkpoints:
  #         - checkpoint_path: /mnt/coreai_3d/tree/jianyuan/cw_ckpts/checkpoint_p0_jan06_10b/checkpoint_p0_jan06_10b.pt
  #           ckpt_state_dict_keys:
  #           - model
  #           checkpoint_kernels:
  #             - _target_: omnivision.model.checkpoint_utils.CkptExcludeKernel
  #               key_pattern:
  #                 - "*depth_head*"
  #                 - "*camera_head*"

                  
  accum_steps: 1
  visual_viser: False
  val_epoch_freq: 10
  seed_value: ${seed_value}

  max_epochs: 100
  limit_train_batches: 1000
  limit_val_batches: 100


  distributed:
    backend: nccl
    find_unused_parameters: False


  optim:
    aggregator_layerwise_decay: 0.98
    optimizer:
      _target_: torch.optim.AdamW
      lr: ${base_lr}
      weight_decay: 0.05

    amp:
      enabled: True


    gradient_clip:
      _target_: vggt.utils.gradient_clip.GradientClipper
      configs:
        - module_name: ["patch_embed"]  # Or ["aggregator", "other_module"]
          max_norm: 0.1
          norm_type: 2
        - module_name: ["aggregator", "head"]  # Or ["aggregator", "other_module"]
          max_norm: 1.0
          norm_type: 2


    options:
      lr:
        - scheduler:
            _target_: fvcore.common.param_scheduler.CompositeParamScheduler
            schedulers:
              - _target_: fvcore.common.param_scheduler.LinearParamScheduler
                start_value: ${min_lr}
                end_value: ${base_lr}
              - _target_: fvcore.common.param_scheduler.CosineParamScheduler
                start_value: ${base_lr}
                end_value: ${min_lr}
            lengths: [0.1, 0.9]
            interval_scaling: ['rescaled', 'rescaled']
        - scheduler:
            _target_: fvcore.common.param_scheduler.CompositeParamScheduler
            schedulers:
              - _target_: fvcore.common.param_scheduler.LinearParamScheduler
                start_value: ${patch_min_lr}
                end_value: ${patch_base_lr}
              - _target_: fvcore.common.param_scheduler.CosineParamScheduler
                start_value: ${patch_base_lr}
                end_value: ${patch_min_lr}
            lengths: [0.1, 0.9]
            interval_scaling: ['rescaled', 'rescaled']
          param_names:
            - '*patch_embed*'
      weight_decay:
        - scheduler:
            _target_: fvcore.common.param_scheduler.ConstantParamScheduler
            value: 0.05



  data:
    train:
      _target_: vggt.data.dynamic_dataloader.DynamicTorchDataset
      num_workers: ${num_workers}
      max_img_per_gpu: ${max_img_per_gpu}
      use_spawn: ${use_spawn} # True
      dyna_ratio: ${dyna_ratio}
      sync_image_num: False
      sync_node: False
      persistent_workers: False
      reuse_dataloader: False
      seed: ${seed_value}
      shuffle: ${shuffle}
      pin_memory: True
      common_config:
        sample_dict: "s1"
        ratio_dict: "s1"
        img_size: ${img_size}
        patch_size: ${patch_size}
        debug: ${debug}
        repeat_batch: False
        img_nums: [2, 16]
        aug_principal_point: True
        random_rotation_ratio: -1
        random_patch_mask_size: 128
        random_patch_mask_ratio: 0.05
        load_track: ${load_track}
        track_num: ${track_num}
        load_similarity: ${load_similarity}
        load_ray_map: True
        thread_io_worker_num: 8
        augs:
          aspects: [0.6, 2.0]
          # 
          cojitter_ratio: 0.6
          color_jitter:
            brightness: 0.85
            contrast: 0.75
            saturation: 0.5
            hue: 0.1
            p: 0.9
      dataset:
        _target_: vggt.data.composed_dataset.ComposedDataset
    val:
      _target_: vggt.data.dynamic_dataloader.DynamicTorchDataset
      num_workers: ${num_workers}
      max_img_per_gpu: ${max_img_per_gpu}
      sync_image_num: False
      use_spawn: ${use_spawn}
      shuffle: ${shuffle}
      pin_memory: True
      seed: ${seed_value}
      common_config:
        sample_dict: "s1"
        ratio_dict: "s1"
        img_size: ${img_size}
        patch_size: ${patch_size}
        debug: ${debug}
        load_track: ${load_track}
        track_num: ${track_num}
        load_similarity: ${load_similarity}
        load_ray_map: True
        thread_io_worker_num: -1
      dataset:
        _target_: vggt.data.composed_dataset.ComposedDataset



  loss:
    _target_: vggt.losses.loss.MultitaskLoss
    unproject_depth_to_points: False
    use_cam2world: False
    normalize_predictions: True
    verbose: False
    intrinsics_warmup_ratio: 0.5
    camera:
      weight: 10.0
      loss_type: "l1_consistent" # The paper uses smooth l1 loss, but we found l1 loss is more stable than smooth l1 and l2 loss.
      weight_trans: 2.0
      pose_encoding_type: "absT_quaR_FoV"
    depth:
      # Coupled Mode: confidence learns to identify hard-to-predict regions
      weight: 5.0
      gradient_loss_fn: "grad"
      valid_range: 0.98
      conf_reg_weight: 0.5
      conf_rel_weight: 2.0
      conf_loss_weight: 0.0
      rel_loss_weight: 0.1
      grad_loss_weight: 5.0
      loss_type: "l1"
    point: null
      # Decoupled Mode: regression uses absolute loss, confidence learns from relative loss
      # weight: 0.5
      # conf_loss_weight: 0.0
      # gradient_loss_fn: "normal"
      # grad_loss_weight: 0.5
      # valid_range: 0.95
      # loss_type: "l1"
    ray:
      # Simple regression loss, no confidence involved
      weight: 0.5
      loss_type: "l1"
    match:
      weight: 0.1
      temperature_pos: 0.5
      temperature_neg: 0.8
      m_neg: -0.2
      negative_weight: 0.25
    track: null

