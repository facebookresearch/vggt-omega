submitit:
  name: "d003_1b"
  timeout_min: 8000
  cpus_per_task: 12
  account: "fair_amaia_cw_scale"
  qos: "scale"
  # account: "fair_amaia_cw_explore"
  # qos: "explore"
  mem_gb: 0
  use_cluster: True
  partition: learn



# Single Depth

use_spawn: True # set for debug. For training, set to True

#
debug: False
batch_size: 4 # 16    # TODO
fix_img_num: 8 # 2
img_size: 512
patch_size: 16
num_workers: 12
# load_track: True
load_track: False
load_similarity: True
track_num: 512
shuffle: True
seed_value: 96
max_img_per_gpu: 88

base_lr: 1e-4
min_lr: 2e-7
patch_base_lr: 5e-6
patch_min_lr: 1e-7
dyna_ratio: 2.0
aggregator_register_num: 8

launcher:
  gpus_per_node: 8 # 8
  num_nodes: 4 # 8

#################


#########################################################
# FSDP settings
# constants:
#   fsdp_wrap_module_cls:
#     - "torch.nn.Linear"
#   fsdp_wrap_module_tags:
#     - "frozen_tag"
#########################################################

trainer:
  cuda:
    allow_tf32: False
    cudnn_deterministic: False
    cudnn_benchmark: False

  #########################################################

  #########################################################

  # checkpoint:
  #   model_weight_initializer:
  #     _partial_: True
  #     _target_: omnivision.model.checkpoint_utils.load_state_dict_into_model
  #     strict: False
  #     state_dict:
  #       _target_: omnivision.model.checkpoint_utils.load_multiple_checkpoints_and_apply_kernels
  #       checkpoints:
  #         - checkpoint_path: /checkpoint/amaia/explore/jianyuan/vggt/config/experiments/mast/d001.yaml/0/checkpoints/checkpoint.pt
  #           ckpt_state_dict_keys:
  #           - model
  #           checkpoint_kernels:
  #             - _target_: omnivision.model.checkpoint_utils.CkptExcludeKernel
  #               key_pattern:
  #                 - "*camera_head*"
  #                 - "*depth_head*"
  #                 - "*match_head*"


  accum_steps: 1
  visual_viser: False
  val_epoch_freq: 5
  seed_value: ${seed_value}

  max_epochs: 100
  limit_train_batches: 1000
  limit_val_batches: 100


  distributed:
    backend: nccl
    find_unused_parameters: False


  optim:
    optimizer:
      _target_: torch.optim.AdamW
      lr: ${base_lr}
      weight_decay: 0.05

    amp:
      enabled: True


    gradient_clip:
      _target_: vggt.utils.gradient_clip.GradientClipper
      configs:
        - module_name: ["patch_embed"]  # Or ["aggregator", "other_module"]
          max_norm: 0.1
          norm_type: 2
        - module_name: ["aggregator", "head"]  # Or ["aggregator", "other_module"]
          max_norm: 1.0
          norm_type: 2


    options:
      lr:
        - scheduler:
            _target_: fvcore.common.param_scheduler.CompositeParamScheduler
            schedulers:
              - _target_: fvcore.common.param_scheduler.LinearParamScheduler
                start_value: ${min_lr}
                end_value: ${base_lr}
              - _target_: fvcore.common.param_scheduler.CosineParamScheduler
                start_value: ${base_lr}
                end_value: ${min_lr}
            lengths: [0.05, 0.95]
            interval_scaling: ['rescaled', 'rescaled']
        - scheduler:
            _target_: fvcore.common.param_scheduler.CompositeParamScheduler
            schedulers:
              - _target_: fvcore.common.param_scheduler.LinearParamScheduler
                start_value: ${patch_min_lr}
                end_value: ${patch_base_lr}
              - _target_: fvcore.common.param_scheduler.CosineParamScheduler
                start_value: ${patch_base_lr}
                end_value: ${patch_min_lr}
            lengths: [0.05, 0.95]
            interval_scaling: ['rescaled', 'rescaled']
          param_names:
            - '*patch_embed*'
      weight_decay:
        - scheduler:
            _target_: fvcore.common.param_scheduler.ConstantParamScheduler
            value: 0.05



  model:
    _target_: vggt.models.models.vggt.VGGT
    enable_head_amp: True
    init_aggregator_by_patch_embed: False
    ############## VIT7B16 ##############
    # patch_embed: "dinov3_vit7b16"
    ############## VIT7B16 ##############
    #
    ############## VITL16 ##############
    patch_embed: "dinov3_vitl16"
    ############## VITL16 ##############
    img_size: ${img_size}
    patch_size: ${patch_size}
    embed_dim: 1024
    AGGREGATOR:
      _target_: vggt.models.models.aggregator.Aggregator
      img_size: ${img_size}
      num_register_tokens: ${aggregator_register_num}
      patch_size: ${patch_size}
      embed_dim: 1024
      depth: 24
      num_heads: 16
      mlp_ratio: 4.0
      use_qk_norm: True
      global_attn_mode: "specials"
      global_attn_partial_ratio: 0.25
      # aa_order: ["global", "frame"]
      aa_order: ["frame", "global"]
      use_dino_clsreg: True
      #
      rope_dtype: "fp32"
      disable_rope_global: True
      #
      proj_dim: -1
      # fuse_type: "add"
      # proj_dim: 1024
      #
      ############## VIT7B16 ##############
      # proj_list: [9, 19, 29, 39]
      # patch_embed_dim: 4096
      ############## VIT7B16 ##############
      #
      ############## VITL16 ##############
      # proj_list: [4, 11, 17, 23]
      # patch_embed_dim: 1024
      ############## VITL16 ##############
    CAMERA_HEAD:
      _target_: vggt.models.heads.camera_head_linear.CameraHeadLinear
      dim_in: 2048
      # linear_forward: True
      pose_encoding_type: "absT_quaR_FoV"
      # embed_pose_type: "mlp"
      # use_qk_norm: True
      mlp_ratio: [0.5]
    DEPTH_HEAD:
      _target_: vggt.models.heads.linear_head.LinearHead
      dim_in: 2048
      output_dim: 2
      activation: "exp"
      conf_activation: "expp1"
      patch_size: ${patch_size}
      proj_type: "mlp_self"
      mlp_ratio: 0.5
    POINT_HEAD: null
    RAY_HEAD:
      _target_: vggt.models.heads.linear_head.LinearHead
      dim_in: 2048
      output_dim: 6
      activation: "none"
      patch_size: ${patch_size}
      proj_type: "mlp_self"
      mlp_ratio: 0.5
    MATCH_HEAD:
      _target_: vggt.models.heads.linear_feat_head.LinearFeatHead
      predict_tokens_dim: 512
      dim_in: 2048
      patch_size: ${patch_size}
      mlp_ratio: 0.5
      normalize_act: "norm"



  data:
    train:
      _target_: vggt.data.dynamic_dataloader.DynamicTorchDataset
      num_workers: ${num_workers}
      max_img_per_gpu: ${max_img_per_gpu}
      use_spawn: ${use_spawn} # True
      dyna_ratio: ${dyna_ratio}
      sync_image_num: False
      persistent_workers: False
      seed: ${seed_value}
      shuffle: ${shuffle}
      pin_memory: True
      common_config:
        sample_dict: "s1"
        ratio_dict: "s1"
        img_size: ${img_size}
        patch_size: ${patch_size}
        debug: ${debug}
        repeat_batch: False
        img_nums: [1, 32]
        aug_principal_point: True
        random_rotation_ratio: 0.01
        random_patch_mask_size: 128
        random_patch_mask_ratio: 0.05
        load_track: ${load_track}
        track_num: ${track_num}
        load_similarity: ${load_similarity}
        load_ray_map: True
        thread_io_worker_num: -1
        augs:
          aspects: [0.75, 1.33]
      dataset:
        _target_: vggt.data.composed_dataset.ComposedDataset
    val:
      _target_: vggt.data.dynamic_dataloader.DynamicTorchDataset
      num_workers: ${num_workers}
      max_img_per_gpu: ${max_img_per_gpu}
      sync_image_num: False
      use_spawn: ${use_spawn}
      shuffle: ${shuffle}
      pin_memory: True
      seed: ${seed_value}
      common_config:
        sample_dict: "s1"
        ratio_dict: "s1"
        img_size: ${img_size}
        patch_size: ${patch_size}
        debug: ${debug}
        load_track: ${load_track}
        track_num: ${track_num}
        load_similarity: ${load_similarity}
        load_ray_map: True
        thread_io_worker_num: -1
      dataset:
        _target_: vggt.data.composed_dataset.ComposedDataset



  loss:
    _target_: vggt.losses.loss.MultitaskLoss
    unproject_depth_to_points: True
    use_cam2world: False
    normalize_predictions: False
    verbose: False
    camera:
      weight: 5.0
      loss_type: "l1" # The paper uses smooth l1 loss, but we found l1 loss is more stable than smooth l1 and l2 loss.
      weight_trans: 5.0
      pose_encoding_type: "absT_quaR_FoV"
    depth:
      weight: 1.0
      gradient_loss_fn: "grad"
      valid_range: 0.98
      rel_loss_weight: 1.0
      loss_type: "l1"
      decouple_conf: True
    point:
      weight: 1.0
      gradient_loss_fn: "grad"
      valid_range: 0.98
      rel_loss_weight: 1.0
      loss_type: "l1"
      decouple_conf: True
    ray:
      weight: 1.0
      gradient_loss_fn: null
      # valid_range: 0.98
      rel_loss_weight: -1.0
      loss_type: "l1"
      decouple_conf: False
    match:
      weight: 0.1
      temperature_pos: 0.5
      temperature_neg: 2.0
      m_neg: -0.2
      negative_weight: 0.1
    track: null




  logging:
    log_freq: 1
    # log_level_secondary: "INFO"
    # all_ranks: True
    scalar_keys_to_log:
      train:
        keys_to_log:
          # Depth head
          - loss_depth
          - loss_conf_depth
          - loss_reg_depth
          - loss_grad_depth
          - loss_reg_relative_depth
          - d1
          - d2
          - d3
          - abs_rel
          - sq_rel
          - rmse
          - rmse_log
          # Point head
          - loss_point
          - loss_conf_point
          - loss_reg_point
          - loss_grad_point
          - loss_reg_relative_point
          # Ray head
          - loss_ray
          # - loss_conf_ray
          # - loss_reg_ray
          # - loss_grad_ray
          # - loss_reg_relative_ray
          # Camera head
          - loss_camera
          - loss_T
          - loss_R
          - loss_FL
          - loss_PP
          - Rac_5
          - Tac_5
          - Rac_15
          - Tac_15
          - Auc_30
          - Auc_10
          - Auc_5
          - Auc_3
          # Match head
          - loss_patch_bce
          - loss_patch_pos
          - loss_patch_neg
          - num_pos_pairs
          - num_neg_pairs
      val:
        keys_to_log:
          # Depth head
          - loss_depth
          - loss_conf_depth
          - loss_reg_depth
          - loss_grad_depth
          - loss_reg_relative_depth
          - d1
          - d2
          - d3
          - abs_rel
          - sq_rel
          - rmse
          - rmse_log
          # Point head
          - loss_point
          - loss_conf_point
          - loss_reg_point
          - loss_grad_point
          - loss_reg_relative_point
          # Ray head
          - loss_ray
          # - loss_conf_ray
          # - loss_reg_ray
          # - loss_grad_ray
          # - loss_reg_relative_ray
          # Camera head
          - loss_camera
          - loss_T
          - loss_R
          - loss_FL
          - loss_PP
          - Rac_5
          - Tac_5
          - Rac_15
          - Tac_15
          - Auc_30
          - Auc_10
          - Auc_5
          - Auc_3
          # Match head
          - loss_patch_bce
          - loss_patch_pos
          - loss_patch_neg
          - num_pos_pairs
          - num_neg_pairs

