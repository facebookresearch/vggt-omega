# @package _global_
# Ablation: Remove preg head and loss

defaults:
  - /experiments/cw/t5

submitit:
  name: "t5_ab_no_preg"

trainer:
  model:
    POINT_HEAD: null

  loss:
    preg: null

  logging:
    scalar_keys_to_log:
      train:
        keys_to_log:
          - loss_obj
          - mean_depth_raw
          # Camera
          - loss_camera
          - loss_T
          - loss_R
          - loss_FL
          - loss_PP
          - loss_VP
          - loss_PW
          - pred_T_max
          # Camera Metrics
          - Rac_5
          - Rac_15
          - Tac_5
          - Tac_15
          - Auc_3
          - Auc_5
          - Auc_10
          - Auc_30
          # Depth
          - loss_depth
          - loss_pts_l1
          - loss_pts_l1_max
          - loss_normal
          - loss_conf_depth
          # Depth Metrics
          - d1
          - d2
          - d3
          - abs_rel
          - sq_rel
          - rmse
          - rmse_log
          # Mask
          - loss_mask
          - mask_pos_ratio
          # Point
          - loss_point
          - loss_point_l1
          - loss_point_l1_max
          - loss_point_normal
          # Consistency
          - loss_consistency
          - loss_consistency_max
          - consistency_valid_count
          - loss_consistency_reg
          - loss_consistency_reg_max
      val:
        keys_to_log:
          - loss_obj
          - mean_depth_raw
          # Camera
          - loss_camera
          - loss_T
          - loss_R
          - loss_FL
          - loss_PP
          - loss_VP
          - loss_PW
          - pred_T_max
          # Camera Metrics
          - Rac_5
          - Rac_15
          - Tac_5
          - Tac_15
          - Auc_3
          - Auc_5
          - Auc_10
          - Auc_30
          # Depth
          - loss_depth
          - loss_pts_l1
          - loss_pts_l1_max
          - loss_normal
          - loss_conf_depth
          # Depth Metrics
          - d1
          - d2
          - d3
          - abs_rel
          - sq_rel
          - rmse
          - rmse_log
          # Mask
          - loss_mask
          - mask_pos_ratio
          # Point
          - loss_point
          - loss_point_l1
          - loss_point_l1_max
          - loss_point_normal
          # Consistency
          - loss_consistency
          - loss_consistency_max
          - consistency_valid_count
          - loss_consistency_reg
          - loss_consistency_reg_max

