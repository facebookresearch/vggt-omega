# @package _global_
# Ablation: use MSE (squared L2) loss for depth instead of L1

defaults:
  - /experiments/cw/y002

submitit:
  name: "y002_depth_mse"

trainer:
  loss:
    depth:
      weight: 10.0
      weight_normal: 0.005  # reduced from 0.05 to compensate for weight 10x increase
      loss_type: "mse"

