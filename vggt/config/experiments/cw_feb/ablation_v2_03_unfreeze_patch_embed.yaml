# @package _global_
# Ablation v2-03: Unfreeze patch_embed and enable patch embed learning rate schedule

defaults:
  - /experiments/cw/reproduce_pi3_v2

submitit:
  name: "ab03"

trainer:
  optim:
    frozen_module_names: []
    options:
      lr:
        # Main learning rate schedule
        - scheduler:
            _target_: fvcore.common.param_scheduler.CosineParamScheduler
            start_value: ${base_lr}
            end_value: ${min_lr}
        # Patch embed learning rate schedule (0.1x of main)
        - scheduler:
            _target_: fvcore.common.param_scheduler.CosineParamScheduler
            start_value: ${patch_base_lr}
            end_value: ${patch_min_lr}
          param_names:
            - '*patch_embed*'

