# @package _global_
#
# reproduce_pi3_v3.yaml - FIXED config to match Pi3's architecture exactly
#
# Key fixes from reproduce_pi3_v2:
# 1. Aggregator LayerScale init: 0.01 (was 1e-5, 1000x difference!)
# 2. Head extra attention depth: 5 (was 6)
# 3. Head extra attention: no LayerScale (was 1e-5)
# 4. Head extra attention: no QK norm (was True)
# 5. Aggregator: mask_k_bias=False (vggt default was True, zeros out K bias)
# 6. Head extra attention: mask_k_bias=False (vggt default was True)
# 7. Head extra attention: post_norm=False (Pi3 doesn't have post-attention LayerNorm)

defaults:
  - /experiments/base/base_train
  - /experiments/models/pi3_v3_fixed@trainer.model
  - /experiments/cw/datasets/overfit_pi3@trainer.data.train.dataset.dataset_configs.overfit
  - /experiments/cw/datasets/overfit_pi3@trainer.data.val.dataset.dataset_configs.overfit


#################
# Global Variables
#################
use_spawn: True
debug: False
img_size: 224
patch_size: 14
num_workers: 10
load_track: False
load_similarity: False
track_num: 512
shuffle: True
seed_value: 10096

base_lr: 5e-5
min_lr: 5e-10
patch_base_lr: 5e-6
patch_min_lr: 5e-11
dyna_ratio: 2.0
aggregator_register_num: 4


#################
# Submitit Configuration
#################
submitit:
  name: "reproduce_pi3_v3"
  timeout_min: 8000
  cpus_per_task: 12
  account: "fair_amaia_cw_explore"
  qos: "explore"
  mem_gb: 0
  use_cluster: True
  partition: learn


#################
# Launcher Configuration
#################
launcher:
  gpus_per_node: 8
  num_nodes: 1


#################
# Trainer Configuration
#################
trainer:
  model:
    patch_embed: "dinov2_vitl14_reg"
    CAMERA_HEAD:
      pose_encoding_type: "absT_quaR_FoV_c2w"

  cuda:
    allow_tf32: False
    cudnn_deterministic: False
    cudnn_benchmark: False

  accum_steps: 1
  visual_viser: False
  val_epoch_freq: 10
  seed_value: ${seed_value}

  max_epochs: 60
  limit_train_batches: 1000
  limit_val_batches: 100

  optim:
    frozen_module_names:
      - "*patch_embed*"

    filter_bias_and_bn: True
    optimizer:
      _target_: torch.optim.AdamW
      lr: ${base_lr}
      weight_decay: 0.05
      betas: [0.9, 0.95]

    amp:
      enabled: True

    gradient_clip:
      _target_: vggt.utils.gradient_clip.GradientClipper
      configs:
        - module_name: ["aggregator", "head", "patch_embed"]
          max_norm: 1.0
          norm_type: 2

    options:
      lr:
        - scheduler:
            _target_: fvcore.common.param_scheduler.CosineParamScheduler
            start_value: ${base_lr}
            end_value: ${min_lr}
      weight_decay:
        - scheduler:
            _target_: fvcore.common.param_scheduler.ConstantParamScheduler
            value: 0.05


#################
# Loss Configuration
#################
  loss:
    _target_: vggt.losses.loss.MultitaskLoss
    normalize_predictions: True
    normalization_type: "local"
    verbose: False
    intrinsics_warmup_ratio: 0.25
    rel_to_first_cam: False # Pi3 Does not use rel_to_first_cam to the predictions
    align_pred_to_gt: True
    align_resolution: 4096
    camera:
      weight: 0.1
      weight_pairwise: 1.0
      pairwise_rotation_loss_type: "chordal"
      pairwise_translation_loss_type: "l1"
      pairwise_weight_rotation: 1.0
      pairwise_weight_translation: 1.0
      loss_type: "l1_consistent"
      weight_trans: 0.1
      weight_rot: 0.1
      weight_focal: 0.1
      pose_encoding_type: "absT_quaR_FoV_c2w"
    depth:
      weight: 1.0
      weight_normal: 1.0
    point: null
    track: null
    mask: null
    ray: null
    match: null

#################
# Data Loading
#################
  data:
    train:
      _target_: vggt.data.dynamic_dataloader.DynamicTorchDataset
      num_workers: ${num_workers}
      use_spawn: ${use_spawn}
      dyna_ratio: ${dyna_ratio}
      sync_image_num: False
      sync_node: False
      persistent_workers: False
      reuse_dataloader: False
      seed: ${seed_value}
      shuffle: ${shuffle}
      pin_memory: True
      common_config:
        sample_dict: "s1"
        ratio_dict: "s1"
        img_size: ${img_size}
        patch_size: ${patch_size}
        debug: ${debug}
        repeat_batch: False
        img_nums: [2, 3]
        aug_principal_point: True
        random_rotation_ratio: -1
        random_patch_mask_size: 128
        random_patch_mask_ratio: -1
        load_track: ${load_track}
        track_num: ${track_num}
        load_similarity: ${load_similarity}
        load_ray_map: False
        thread_io_worker_num: -1
        rescale_prob: 0.8
        augs:
          enable_image_aug: False
          aspects: [1.0, 1.0]
          cojitter_ratio: 0.6
          jpeg_compression: 0.5
          low_res_blur: 0.5
          color_jitter:
            brightness: 0.75
            contrast: 0.75
            saturation: 0.5
            hue: 0.1
            p: 0.9
        compute_invalid_area: False
        skip_extreme_rescale: True
      dataset:
        _target_: vggt.data.composed_dataset.ComposedDataset
    val:
      _target_: vggt.data.dynamic_dataloader.DynamicTorchDataset
      num_workers: ${num_workers}
      sync_image_num: False
      use_spawn: ${use_spawn}
      shuffle: ${shuffle}
      pin_memory: True
      seed: ${seed_value}
      common_config:
        sample_dict: "s1"
        ratio_dict: "s1"
        img_size: ${img_size}
        patch_size: ${patch_size}
        debug: ${debug}
        load_track: ${load_track}
        track_num: ${track_num}
        load_similarity: ${load_similarity}
        load_ray_map: False
        thread_io_worker_num: -1
        compute_invalid_area: False
        skip_extreme_rescale: True
      dataset:
        _target_: vggt.data.composed_dataset.ComposedDataset


  logging:
    scalar_keys_to_log:
      train:
        keys_to_log:
          - loss_obj
          - loss_depth
          - loss_normal
          - d1
          - d2
          - d3
          - abs_rel
          - loss_camera
          - loss_T
          - loss_R
          - loss_FL
          - loss_PW
          - Rac_5
          - Tac_5
          - Auc_30
          - Auc_10
      val:
        keys_to_log:
          - loss_obj
          - loss_depth
          - loss_normal
          - d1
          - d2
          - d3
          - abs_rel
          - loss_camera
          - loss_T
          - loss_R
          - loss_FL
          - loss_PW
          - Rac_5
          - Tac_5
          - Auc_30
          - Auc_10
