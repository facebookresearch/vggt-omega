# @package _global_
# Curated ablation config (inherits z001_n1)

defaults:
  - /experiments/cw/z001_n1

submitit:
  name: "z001_n1_ablation_07_lap_grad_var_no_preblur"

loss:
  depth:
    weight_normal: 0.25
    use_conf_loss: true
    use_gt_var_weighting: true
    gt_var_kwargs:
      kernel_size: 7
      pre_blur: false
    gradient_loss_config:
      - type: "lap"
        weight: 0.08
        scales: 4
      - type: "grad"
        scales: 4
