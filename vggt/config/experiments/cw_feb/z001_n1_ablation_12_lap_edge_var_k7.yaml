# @package _global_
# Curated ablation config (inherits z001_n1)

defaults:
  - /experiments/cw/z001_n1

submitit:
  name: "z001_n1_ablation_12_lap_edge_var_k7"

loss:
  depth:
    weight_normal: 0.25
    use_conf_loss: true
    use_gt_var_weighting: true
    gt_var_kwargs:
      kernel_size: 7
      pre_blur: true
      pre_blur_k: 5
      pre_blur_sigma: 1.0
    gradient_loss_config:
      - type: "lap"
        weight: 0.08
        scales: 4
      - type: "edge_aware"
        weight: 0.02
        scales: 1
