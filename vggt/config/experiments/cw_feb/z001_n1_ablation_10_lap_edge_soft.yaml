# @package _global_
# Curated ablation config (inherits z001_n1)

defaults:
  - /experiments/cw/z001_n1

submitit:
  name: "z001_n1_ablation_10_lap_edge_soft"

loss:
  depth:
    weight_normal: 0.2
    use_conf_loss: true
    use_gt_var_weighting: false
    gradient_loss_config:
      - type: "lap"
        weight: 0.05
        scales: 4
      - type: "edge_aware"
        weight: 0.02
        scales: 1
