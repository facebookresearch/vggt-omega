# @package _global_
# Curated ablation config (inherits z001_n1)

defaults:
  - /experiments/cw/z001_n1

submitit:
  name: "z001_n1_ablation_18_normalpi_lap_edge"

loss:
  depth:
    weight_normal: 0.35
    use_conf_loss: true
    use_gt_var_weighting: false
    gradient_loss_config:
      - type: "normal_pi"
        weight: 0.1
        scales: 3
      - type: "lap"
        weight: 0.05
        scales: 4
      - type: "edge_aware"
        weight: 0.01
        scales: 1
