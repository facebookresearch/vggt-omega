# @package _global_
# Combines t6_overfitpi3 + no warmup (0.1%) + img_nums [2, 3]

defaults:
  - /experiments/cw/t6_overfitpi3

submitit:
  name: "t6_overfitpi3_no_warmup_img23"

trainer:
  optim:
    options:
      lr:
        - scheduler:
            _target_: fvcore.common.param_scheduler.CompositeParamScheduler
            schedulers:
              - _target_: fvcore.common.param_scheduler.LinearParamScheduler
                start_value: ${min_lr}
                end_value: ${base_lr}
              - _target_: fvcore.common.param_scheduler.CosineParamScheduler
                start_value: ${base_lr}
                end_value: ${min_lr}
            lengths: [0.001, 0.999]
            interval_scaling: ['rescaled', 'rescaled']

  data:
    train:
      common_config:
        img_nums: [2, 3]

