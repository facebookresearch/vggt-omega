# @package _global_
# Curated ablation config (inherits z001_n1)

defaults:
  - /experiments/cw/z001_n1

submitit:
  name: "z001_n1_ablation_16_normalpi_lap"

loss:
  depth:
    weight_normal: 0.3
    use_conf_loss: true
    use_gt_var_weighting: false
    gradient_loss_config:
      - type: "normal_pi"
        weight: 0.1
        scales: 3
      - type: "lap"
        weight: 0.1
        scales: 4
