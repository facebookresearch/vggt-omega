# @package _global_
# Ablation: y005 with node=1, separate conf head for depth & point, conf loss enabled

defaults:
  - /experiments/cw/y005_n1

trainer:
  model:
    DEPTH_HEAD:
      separate_conf_head: True
    POINT_HEAD:
      separate_conf_head: True

  loss:
    depth:
      use_conf_loss: True
      abs_l1_loss_ratio: 1.0
    point:
      use_conf_loss: True
      abs_l1_loss_ratio: 1.0
    preg:
      use_conf_loss: True
      abs_l1_loss_ratio: 1.0

