# @package _global_
# Ablation 21: Combined ablation
#   - init_aggregator_by_patch_embed: True
#   - init_aggregator_skip_first_n: 12
#   - global_attn_mode: "specials"
#   - global_attn_partial_ratio: 0.25
#   - use_dino_clsreg: True
#   - extra_attention_depth: 0
#   - align_pred_to_gt: False
#   - low_res_blur: -1
#   - jpeg_compression: -1

defaults:
  - /experiments/cw/reproduce_pi3

submitit:
  name: "ablation_21_combined"

trainer:
  model:
    init_aggregator_by_patch_embed: True
    init_aggregator_skip_first_n: 12
    AGGREGATOR:
      global_attn_mode: "specials"
      global_attn_partial_ratio: 0.25
      use_dino_clsreg: True
    DEPTH_HEAD:
      extra_attention_depth: 0

  loss:
    align_pred_to_gt: False

  data:
    train:
      common_config:
        augs:
          low_res_blur: -1
          jpeg_compression: -1

