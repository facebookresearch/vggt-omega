# @package _global_
# Curated ablation config (inherits z001_n1)

defaults:
  - /experiments/cw/z001_n1

submitit:
  name: "z001_n1_ablation_06_lap_grad_var_k9"

loss:
  depth:
    weight_normal: 0.25
    use_conf_loss: true
    use_gt_var_weighting: true
    gt_var_kwargs:
      kernel_size: 9
      pre_blur: true
      pre_blur_k: 5
      pre_blur_sigma: 1.0
    gradient_loss_config:
      - type: "lap"
        weight: 0.08
        scales: 4
      - type: "grad"
        scales: 4
