# @package _global_
#
# Ablation: No last layer bias for depth and point head
# Inherits from t9_n1.yaml

defaults:
  - /experiments/cw/t9_n1

#################
# Submitit Configuration
#################
submitit:
  name: "t9_n1_no_head_bias"

#################
# Trainer Configuration
#################
trainer:
  model:
    DEPTH_HEAD:
      proj_bias: False

    POINT_HEAD:
      proj_bias: False

