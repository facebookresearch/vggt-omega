# @package _global_
#


defaults:
  - /experiments/base/base_train
  - /experiments/models_v2/vggt_1b_trans@trainer.model
  - /experiments/cw/dataset_mix_v5
  # - /experiments/cw/datasets/overfit@trainer.data.train.dataset.dataset_configs.overfit
  # - /experiments/cw/datasets/overfit@trainer.data.val.dataset.dataset_configs.overfit


#################
# Global Variables
#################
use_spawn: True
debug: False
img_size: 256
patch_size: 16
num_workers: 10
load_track: True
load_similarity: False
track_num: 512
shuffle: True
seed_value: 10096

base_lr: 2e-5
min_lr: 2e-10
patch_base_lr: 2e-6
patch_min_lr: 2e-11
dyna_ratio: 4.0
aggregator_register_num: 8


#################
# Submitit Configuration
#################
submitit:
  name: "y003_n16"
  timeout_min: 8000
  cpus_per_task: 12
  account: "fair_amaia_cw_scale"
  qos: "scale"
  mem_gb: 0
  use_cluster: True
  partition: learn


#################
# Launcher Configuration
#################
launcher:
  gpus_per_node: 8
  num_nodes: 16


#################
# Trainer Configuration
#################
trainer:
  model:
    DEPTH_HEAD:
      conf_activation: softplus_0.5_5
      disable_conf: True
      # separate_conf_head: True
      # Enable mask prediction head (from 1b_jan002_mask)
      # This adds a separate head that predicts invalid area masks
      predict_mask: True
      mask_activation: "none"

    POINT_HEAD:
      _target_: vggt.models.heads.linear_head.LinearHead
      dim_in: 2048
      output_dim: 4
      activation: "inv_log"
      conf_activation: "softplus_0.5_5"
      patch_size: ${patch_size}
      proj_type: "linear"
      mlp_ratio: 0.5
      disable_conf: True
      predict_mask: False
      mask_activation: "sigmoid"
      separate_conf_head: False
      extra_attention_depth: 4
      disable_last_layer_amp: True
      use_checkpoint: False

    RAY_HEAD: null
    MATCH_HEAD: null

  cuda:
    allow_tf32: False
    cudnn_deterministic: False
    cudnn_benchmark: False


  checkpoint:
    model_weight_initializer:
      _partial_: True
      _target_: omnivision.model.checkpoint_utils.load_state_dict_into_model
      strict: False
      state_dict:
        _target_: omnivision.model.checkpoint_utils.load_multiple_checkpoints_and_apply_kernels
        checkpoints:
          - checkpoint_path: /checkpoint/amaia/explore/jianyuan/vggt/config/experiments/cw/Full_1b_d015_5e5_t2.yaml/0/checkpoints/checkpoint_ab_e98.pt
            ckpt_state_dict_keys:
            - model
            checkpoint_kernels:
              - _target_: omnivision.model.checkpoint_utils.CkptExcludeKernel
                key_pattern:
                  - "*head*"



  accum_steps: 1
  visual_viser: False
  val_epoch_freq: 10
  seed_value: ${seed_value}

  max_epochs: 64
  limit_train_batches: 1000
  limit_val_batches: 100

  optim:

    filter_bias_and_bn: True
    optimizer:
      _target_: torch.optim.AdamW
      lr: ${base_lr}
      weight_decay: 0.05
      betas: [0.9, 0.95]

    amp:
      enabled: True

    gradient_clip:
      _target_: vggt.utils.gradient_clip.GradientClipper
      configs:
        - module_name: ["aggregator", "head", "patch_embed"]
          max_norm: 1.0
          norm_type: 2

    options:
      lr:
        - scheduler:
            _target_: fvcore.common.param_scheduler.CompositeParamScheduler
            schedulers:
              - _target_: fvcore.common.param_scheduler.LinearParamScheduler
                start_value: ${min_lr}
                end_value: ${base_lr}
              - _target_: fvcore.common.param_scheduler.CosineParamScheduler
                start_value: ${base_lr}
                end_value: ${min_lr}
            lengths: [0.05, 0.95]
            interval_scaling: ['rescaled', 'rescaled']
      weight_decay:
        - scheduler:
            _target_: fvcore.common.param_scheduler.ConstantParamScheduler
            value: 0.05


#################
# Loss Configuration
#################
  loss:
    _target_: vggt.losses.loss.MultitaskLoss
    normalize_predictions: True
    normalization_type: "global"
    normalize_gt: "global"
    verbose: False
    intrinsics_warmup_ratio: 0.5
    rel_to_first_cam: False # Pi3 Does not use rel_to_first_cam to the predictions
    align_pred_to_gt: False 
    align_resolution: 8192
    camera:
      weight: 1.0
      weight_pairwise: 0.0
      pairwise_rotation_loss_type: "chordal"
      pairwise_translation_loss_type: "l1"
      pairwise_weight_rotation: 1.0
      pairwise_weight_translation: 1.0
      loss_type: "l1_consistent"
      weight_trans: 1.0
      weight_rot: 1.0
      weight_focal: 1.0
      pose_encoding_type: "absT_quaR_FoV"
    depth:
      weight: 1.0
      weight_normal: 0.05
      abs_l1_loss_ratio: 0.0
      # valid_range: 0.99
    point: null
      # weight: 0.0
      # weight_normal: 1.0
      # abs_l1_loss_ratio: 0.0
      # valid_range: 0.99
    preg:
      weight: 1.0
      weight_normal: 0.05
      abs_l1_loss_ratio: 0.0
      # valid_range: 0.99
    track:
      weight: 1.0
      # weight: 1.0  
      # valid_range: 0.99
    mask: 
      weight: 0.5
      loss_type: "bce"
    ray: null
    match: null

#################
# Data Loading
#################
  data:
    train:
      _target_: vggt.data.dynamic_dataloader.DynamicTorchDataset
      num_workers: ${num_workers}
      use_spawn: ${use_spawn}
      dyna_ratio: ${dyna_ratio}
      sync_image_num: False
      sync_node: False
      persistent_workers: False
      reuse_dataloader: False
      seed: ${seed_value}
      shuffle: ${shuffle}
      pin_memory: True
      common_config:
        sample_dict: "s1"
        ratio_dict: "s1"
        img_size: ${img_size}
        patch_size: ${patch_size}
        debug: ${debug}
        repeat_batch: False
        img_nums: [1, 24]
        aug_principal_point: True
        random_rotation_ratio: 0.01
        random_patch_mask_size: 32
        random_patch_mask_ratio: -1
        load_track: ${load_track}
        track_num: ${track_num}
        load_similarity: ${load_similarity}
        load_ray_map: False
        thread_io_worker_num: -1
        rescale_prob: 0.8
        augs:
          enable_image_aug: True # True
          aspects: [0.75, 1.33]
          cojitter_ratio: 0.6
          jpeg_compression: 0.25
          low_res_blur: 0.25
          color_jitter:
            brightness: 0.75
            contrast: 0.75
            saturation: 0.5
            hue: 0.1
            p: 0.9
        compute_invalid_area: True
        adaptive_step_range: True
        adaptive_step_range_base: 8
        skip_extreme_rescale: True
      dataset:
        _target_: vggt.data.composed_dataset.ComposedDataset
    val:
      _target_: vggt.data.dynamic_dataloader.DynamicTorchDataset
      num_workers: ${num_workers}
      sync_image_num: False
      use_spawn: ${use_spawn}
      shuffle: ${shuffle}
      pin_memory: True
      seed: ${seed_value}
      common_config:
        sample_dict: "s1"
        ratio_dict: "s1"
        img_size: ${img_size}
        patch_size: ${patch_size}
        debug: ${debug}
        load_track: ${load_track}
        track_num: ${track_num}
        load_similarity: ${load_similarity}
        load_ray_map: False
        thread_io_worker_num: -1
        compute_invalid_area: True
        adaptive_step_range: True
        adaptive_step_range_base: 8
        skip_extreme_rescale: True
      dataset:
        _target_: vggt.data.composed_dataset.ComposedDataset


  logging:
    scalar_keys_to_log:
      train:
        keys_to_log:
          - loss_obj
          - mean_depth_raw
          # Camera
          - loss_camera
          - loss_T
          - loss_R
          - loss_FL
          - loss_PP
          - loss_VP
          - loss_PW
          - pred_T_max
          # Camera Metrics
          - Rac_5
          - Rac_15
          - Tac_5
          - Tac_15
          - Auc_3
          - Auc_5
          - Auc_10
          - Auc_30
          # Depth
          - loss_depth
          - loss_pts_l1
          - loss_pts_l1_max
          - loss_normal
          - loss_conf_depth
          # Depth Metrics
          - d1
          - d2
          - d3
          - abs_rel
          - sq_rel
          - rmse
          - rmse_log
          # Mask
          - loss_mask
          - mask_pos_ratio
          # Point
          - loss_point
          - loss_point_l1
          - loss_point_l1_max
          - loss_point_normal
          # Point Reg
          - loss_preg
          - loss_preg_l1
          - loss_preg_l1_max
          - loss_preg_normal
          # Consistency
          - loss_consistency
          - loss_consistency_max
          - consistency_valid_count
          - loss_consistency_reg
          - loss_consistency_reg_max
      val:
        keys_to_log:
          - loss_obj
          - mean_depth_raw
          # Camera
          - loss_camera
          - loss_T
          - loss_R
          - loss_FL
          - loss_PP
          - loss_VP
          - loss_PW
          - pred_T_max
          # Camera Metrics
          - Rac_5
          - Rac_15
          - Tac_5
          - Tac_15
          - Auc_3
          - Auc_5
          - Auc_10
          - Auc_30
          # Depth
          - loss_depth
          - loss_pts_l1
          - loss_pts_l1_max
          - loss_normal
          - loss_conf_depth
          # Depth Metrics
          - d1
          - d2
          - d3
          - abs_rel
          - sq_rel
          - rmse
          - rmse_log
          # Mask
          - loss_mask
          - mask_pos_ratio
          # Point
          - loss_point
          - loss_point_l1
          - loss_point_l1_max
          - loss_point_normal
          # Point Reg
          - loss_preg
          - loss_preg_l1
          - loss_preg_l1_max
          - loss_preg_normal
          # Consistency
          - loss_consistency
          - loss_consistency_max
          - consistency_valid_count
          - loss_consistency_reg
          - loss_consistency_reg_max

