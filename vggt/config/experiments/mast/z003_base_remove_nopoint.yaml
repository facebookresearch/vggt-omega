# @package _global_
#

defaults:
  - /experiments/mast/z003_base
  - _self_


submitit:
  name: "z003_base_remove_nopoint"


trainer:
  loss:
    point:
      weight: 1.0
      weight_normal: 1.0
      min_valid_pts: 100
      abs_l1_loss_ratio: 1.0
      rel_l1_loss_ratio: 0
      use_conf_loss: False
      conf_alpha: 0.2
      add_separate_reg_loss: True
      separate_reg_loss_weight: 1.0
      apply_aux_loss_to_synthetic_only: True
      valid_range: 0.98
      normalize_by_scale: False
      gradient_loss_config: null
