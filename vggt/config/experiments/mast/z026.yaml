# try back to VGGT

defaults:
  - /experiments/base/base_train
  - /experiments/models_restart/vggt_1b@trainer.model
  # - /experiments/base/base_fsdp
  # - /experiments/cw/dataset_mix_v6_synt_withreg_v0
  - /experiments/mast/z026_datasets
  # - /experiments/cw/submitit/include_nodes@submitit
  # - /experiments/cw/datasets/overfit@trainer.data.train.dataset.dataset_configs.overfit
  # - /experiments/cw/datasets/overfit@trainer.data.val.dataset.dataset_configs.overfit

#################
# Global Variables
#################
use_spawn: True
debug: False
img_size: 512
patch_size: 16
num_workers: 4
# num_workers: 4
load_track: True
load_similarity: False
synt_ratio: 1.0
g_ratio: 1.0
len_multiplier: 400
track_num: 512
low_res_blur_min_ratio: 0.5
shuffle: True
seed_value: 16

base_lr: 2.5e-5
warmup_start_lr: 1e-6
min_lr: 2.5e-5
patch_base_lr: 2.5e-6
patch_warmup_start_lr: 1e-7
patch_min_lr: 2.5e-6
# dyna_ratio: 4.0
# dyna_ratio: 3.0
dyna_ratio: 1.0
aggregator_register_num: 16
use_flash_attn: True # NOTE for what?


#################
# Submitit Configuration
#################
submitit:
  name: "z010"
  timeout_min: 8000
  cpus_per_task: 12
  # account: "fair_amaia_cw_explore"
  # qos: "explore"
  account: "fair_amaia_cw_scale"
  qos: "scale"
  mem_gb: 0
  use_cluster: True
  partition: learn


#################
# Launcher Configuration
#################
launcher:
  gpus_per_node: 8
  num_nodes: 16


#################
# Trainer Configuration
#################
trainer:
  model:
    # pos_embed_rope_rescale_coords: 2
    # norm_denominator: 50

    # force_rope_normalize_coords_max: True
    # patch_embed_out_indices: [4]
    force_rope_normalize_coords_max: True

    AGGREGATOR:
      # match_patch_embed_rope_behavior: True
      # rope_rescale_coords: 2
      # global_attn_mode: "registers"
      use_flash_attn: ${use_flash_attn}
      use_dino_clsreg: False

    # New camera trunk
    CAMERA_HEAD:
      _target_: vggt.models.heads.camera_head_linear.CameraHeadLinear
      dim_in: 2048
      pose_encoding_type: "absT_quaR_FoV"
      mlp_ratio: [0.5]
      patch_size: ${patch_size}
      extra_attention_depth: 4
      extra_attention_dim: -1
      extra_attention_pre_norm: True
      extra_attention_post_norm: True
      extra_attention_use_qk_norm: False
      # extra_attention_use_all_special_tokens: False
      use_checkpoint: False
      # use_flash_attn: ${use_flash_attn} # NOTE Flash ATT V3 does not support FP32
      disable_last_layer_amp: True

    DEPTH_HEAD:
      _target_: vggt.models.heads.dpt_linear_head.DPTLinearHead
      dim_in: 2048
      output_dim: 2
      activation: "exp"
      conf_activation: "expp1"
      patch_size: ${patch_size}
      features: 256
      out_channels: [256, 512, 1024, 1024]
      intermediate_layer_idx: [4, 11, 17, 23]
      # pos_embed: False
      predict_mask: False
      mask_activation: "none"
      # disable_conf: True
      pos_embed: True
      use_patch_embed_intermediate: False
      disable_last_layer_amp: True
      proj_type: "linear"
      mlp_ratio: 0.5
      fusion_block_relu_inplace: False

    POINT_HEAD: null
      # _target_: vggt.models.heads.dpt_head.DPTHead
      # dim_in: 2048
      # output_dim: 4
      # activation: "inv_log"
      # conf_activation: "expp1"
      # patch_size: ${patch_size}
      # features: 256
      # out_channels: [256, 512, 1024, 1024]
      # intermediate_layer_idx: [4, 11, 17, 23]
      # # pos_embed: False
      # predict_mask: False
      # mask_activation: "none"
      # disable_conf: True
      # pos_embed: True

    RAY_HEAD: null
    MATCH_HEAD: null

  cuda:
    allow_tf32: False
    cudnn_deterministic: False
    cudnn_benchmark: False

  resume_ckpt_path: /checkpoint/repligen/outputs/z022_0-l5hfrrsz/checkpoints/checkpoint.pt

  # checkpoint:
  #   save_freq: 1
  #   model_weight_initializer:
  #     _partial_: True
  #     _target_: omnivision.model.checkpoint_utils.load_state_dict_into_model
  #     strict: False
  #     state_dict:
  #       _target_: omnivision.model.checkpoint_utils.load_multiple_checkpoints_and_apply_kernels
  #       checkpoints:
  #         - checkpoint_path: /mnt/coreai_3d/tree/jianyuan/ckpts_apr/w008_linear_t6_synt.yaml/0/checkpoints/checkpoint.pt
  #           ckpt_state_dict_keys:
  #             - model
  #           checkpoint_kernels:
  #             - _target_: omnivision.model.checkpoint_utils.CkptExcludeKernel
  #               key_pattern:
  #                 - "*depth_head.proj_conf*"

  accum_steps: 1
  visual_viser: False
  val_epoch_freq: 200
  seed_value: ${seed_value}

  max_epochs: 100
  limit_train_batches: 500
  limit_val_batches: 100

  optim:
    filter_bias_and_bn: True
    frozen_param_names:
      - "*depth_head.proj_conf*"

    # frozen_module_names:
    #   - "*patch_embed*"

    optimizer:
      _target_: torch.optim.AdamW
      lr: ${base_lr}
      weight_decay: 0.05
      betas: [0.9, 0.95]

    amp:
      enabled: True

    gradient_clip:
      _target_: vggt.utils.gradient_clip.GradientClipper
      configs:
        - module_name: ["aggregator", "patch_embed"]
          max_norm: 1.0
          norm_type: 2
        - module_name: ["depth_head"]
          max_norm: 1.0
          norm_type: 2
        - module_name: ["point_head"]
          max_norm: 1.0
          norm_type: 2
        - module_name: ["camera_head"]
          max_norm: 1.0
          norm_type: 2

    options:
      lr:
        # Default LR schedule for all non-patch-embed parameters.
        # 0-5%: linear warmup, 5-100%: constant LR.
        - scheduler:
            _target_: fvcore.common.param_scheduler.CompositeParamScheduler
            schedulers:
              - _target_: fvcore.common.param_scheduler.LinearParamScheduler
                start_value: ${warmup_start_lr}
                end_value: ${base_lr}
              - _target_: fvcore.common.param_scheduler.ConstantParamScheduler
                value: ${base_lr}
            lengths: [0.05, 0.95]
            interval_scaling: ['rescaled', 'rescaled']
        # Patch embed uses 0.1x of the default LR schedule.
        # 0-5%: linear warmup, 5-100%: constant LR.
        - scheduler:
            _target_: fvcore.common.param_scheduler.CompositeParamScheduler
            schedulers:
              - _target_: fvcore.common.param_scheduler.LinearParamScheduler
                start_value: ${patch_warmup_start_lr}
                end_value: ${patch_base_lr}
              - _target_: fvcore.common.param_scheduler.ConstantParamScheduler
                value: ${patch_base_lr}
            lengths: [0.05, 0.95]
            interval_scaling: ['rescaled', 'rescaled']
          param_names:
            - "*patch_embed*"
      weight_decay:
        - scheduler:
            _target_: fvcore.common.param_scheduler.ConstantParamScheduler
            value: 0.05


#################
# Loss Configuration
#################
  loss:
    _target_: vggt.losses.loss.MultitaskLoss
    ####################################################################################################
    # DO NOT DO NORMALIZATION!
    normalize_predictions: True
    normalization_type: "global"
    normalize_gt: "global"
    mean_type: "arithmetic"
    align_pred_to_gt: False 
    #################################################################################################### 
    verbose: False
    intrinsics_warmup_ratio: 0.95
    rel_to_first_cam: False # Pi3 Does not use rel_to_first_cam to the predictions
    align_resolution: 8192
    camera:
      weight: 2.0
      ####################################################################################################
      weight_pairwise: 1.0
      pairwise_rotation_loss_type: "chordal"
      pairwise_translation_loss_type: "l1_robust_direction"
      pairwise_weight_rotation: 1.0
      pairwise_weight_translation: 1.0
      ####################################################################################################
      loss_type: "l1_consistent"
      weight_trans: 2.0
      weight_rot: 1.0
      weight_focal: 1.0
      normalize_trans_by_gt_scale: True
      pose_encoding_type: "absT_quaR_FoV"
    depth:
      weight: 5.0
      loss_space: "depth"
      # skip_unprojection_for_depth_grad_loss: True
      weight_normal: 1.0
      min_valid_pts: 100
      abs_l1_loss_ratio: 1.0
      rel_l1_loss_ratio: 0.2
      use_conf_loss: False
      conf_alpha: 0.2
      add_separate_reg_loss: True
      separate_reg_loss_weight: 1.0
      apply_aux_loss_to_synthetic_only: True
      valid_range: -1 # 0.98
      gradient_loss_config:
        - type: "normal_pi"
          scales: 1
          min_valid_samples: 100
          weight: 0.1
        - type: "grad"
          scales: 4
          weight: 1.0
    point:
      weight: 5.0
      weight_normal: 0.0
      min_valid_pts: 100
      abs_l1_loss_ratio: 1.0
      rel_l1_loss_ratio: 0.2
      use_conf_loss: False
      conf_alpha: 0.2
      add_separate_reg_loss: True
      separate_reg_loss_weight: 1.0
      apply_aux_loss_to_synthetic_only: True
      valid_range: -1 # 0.98
      normalize_by_scale: False
      gradient_loss_config: null
        # - type: "normal"
        #   scales: 3
        #   min_valid_samples: 10
        #   weight: 1.0
    preg: null
      # weight: 1.0
      # weight_normal: 1.0
      # min_valid_pts: 100
      # abs_l1_loss_ratio: 1.0
      # rel_l1_loss_ratio: 0
      # use_conf_loss: False
      # conf_alpha: 0.2
      # add_separate_reg_loss: True
      # separate_reg_loss_weight: 1.0
      # apply_aux_loss_to_synthetic_only: True
      # valid_range: 0.98
      # normalize_by_scale: False
      # gradient_loss_config:
      #   - type: "normal"
      #     scales: 3
      #     min_valid_samples: 10
      #     weight: 1.0
    track:
      weight: 5.0
    mask: null
      # weight: 5.0
      # loss_type: "bce"
    ray: null
    match: null

#################
# Data Loading
#################
