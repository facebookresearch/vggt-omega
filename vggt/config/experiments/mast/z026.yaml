        random_rotation_ratio: 0.02 # -1 # 0.01 # TO BE APPLIED IN LATER PHASES
        random_patch_mask_size: 128
        random_patch_mask_ratio: -1 # 0.05 # -1
        load_track: ${load_track}
        track_num: ${track_num}
        load_similarity: ${load_similarity}
        synt_ratio: ${synt_ratio}
        g_ratio: ${g_ratio}
        len_multiplier: ${len_multiplier}
