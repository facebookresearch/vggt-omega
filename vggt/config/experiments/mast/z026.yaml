          midair:
            max_depth: 1600
            # max_interval: 200
            # step_range: 200
          mvssync:
            max_depth: 1600
          r2_b1:
            max_depth: 1600
          # r2_crys:
          #   max_depth: 1600
          r2_mv:
            max_depth: 1600
