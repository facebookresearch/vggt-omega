# @package _global_
#

defaults:
  - /experiments/cw/ab_no_point_head
  - _self_


submitit:
  name: "ab_no_point_head_dpt"


trainer:
  model:
    DEPTH_HEAD:
      _target_: vggt.models.heads.dpt_head.DPTHead
      dim_in: 2048
      output_dim: 2
      activation: "exp"
      conf_activation: "softplus_0.5_10"
      patch_size: ${patch_size}
      features: 256
      out_channels: [256, 512, 1024, 1024]
      intermediate_layer_idx: [4, 11, 17, 23]
      pos_embed: False
      predict_mask: True
      mask_activation: "none"

  checkpoint:
    model_weight_initializer:
      state_dict:
        checkpoints:
          - checkpoint_path: /checkpoint/amaia/explore/jianyuan/vggt/config/experiments/cw/omega_v3_norm.yaml/0/checkpoints/checkpoint.pt
            ckpt_state_dict_keys:
              - model
            checkpoint_kernels:
              - _target_: omnivision.model.checkpoint_utils.CkptExcludeKernel
                key_pattern:
                  - "*depth_head*"
          - checkpoint_path: /checkpoint/amaia/explore/jianyuan/vggt/config/experiments/cw_feb_v2/z004_dpt_1b.yaml/0/checkpoint_unwrapped.pt
            ckpt_state_dict_keys:
              - model
            checkpoint_kernels:
              - _target_: omnivision.model.checkpoint_utils.CkptIncludeKernel
                key_pattern:
                  - "*depth_head*"
