# @package _global_
#


# try back to VGGT

defaults:
  - /experiments/base/base_train
  - /experiments/models_restart/vggt_1b@trainer.model
  # - /experiments/base/base_fsdp
  # - /experiments/cw/dataset_mix_v6_synt_withreg_v0
  - /experiments/cw/dataset_mix_restart_v5_t2
  - /experiments/cw/submitit/exclude_nodes@submitit
  # - /experiments/cw/submitit/include_nodes@submitit
  # - /experiments/cw/datasets/overfit@trainer.data.train.dataset.dataset_configs.overfit
  # - /experiments/cw/datasets/overfit@trainer.data.val.dataset.dataset_configs.overfit

#################
# Global Variables
#################
use_spawn: True
debug: False
img_size: 512
patch_size: 16
num_workers: 8
# num_workers: 4
load_track: False
load_similarity: False
# synt_ratio: 0.5
synt_ratio: 0.5
g_ratio: 0.5
len_multiplier: 2000
track_num: 512
shuffle: True
seed_value: 96

base_lr: 1e-4 # 5e-5
min_lr: 1e-7
patch_base_lr: 1e-5 # 5e-6
patch_min_lr: 1e-8
# dyna_ratio: 4.0
# dyna_ratio: 3.0
dyna_ratio: 0.5
aggregator_register_num: 16
use_flash_attn: True # NOTE for what?


#################
# Submitit Configuration
#################
submitit:
  name: "w001"
  timeout_min: 8000
  cpus_per_task: 12
  account: "fair_amaia_cw_explore"
  qos: "explore"
  # account: "fair_amaia_cw_scale"
  # qos: "scale"
  mem_gb: 0
  use_cluster: True
  partition: learn


#################
# Launcher Configuration
#################
launcher:
  gpus_per_node: 8
  num_nodes: 32


#################
# Trainer Configuration
#################
trainer:
  model:
    # pos_embed_rope_rescale_coords: 2
    # norm_denominator: 50

    # force_rope_normalize_coords_max: True
    # patch_embed_out_indices: [4]
    force_rope_normalize_coords_max: True

    AGGREGATOR:
      # match_patch_embed_rope_behavior: True
      # rope_rescale_coords: 2
      # global_attn_mode: "registers"
      use_flash_attn: ${use_flash_attn}
      use_dino_clsreg: False

    # New camera trunk
    CAMERA_HEAD:
      _target_: vggt.models.heads.camera_head_linear.CameraHeadLinear
      dim_in: 2048
      pose_encoding_type: "absT_quaR_FoV"
      mlp_ratio: [0.5]
      patch_size: ${patch_size}
      extra_attention_depth: 4
      extra_attention_dim: -1
      extra_attention_pre_norm: True
      extra_attention_post_norm: True
      extra_attention_use_qk_norm: False
      # extra_attention_use_all_special_tokens: False
      use_checkpoint: False
      # use_flash_attn: ${use_flash_attn} # NOTE Flash ATT V3 does not support FP32
      disable_last_layer_amp: True

    DEPTH_HEAD:
      _target_: vggt.models.heads.dpt_head.DPTHead
      dim_in: 2048
      output_dim: 2
      activation: "exp"
      conf_activation: "expp1"
      patch_size: ${patch_size}
      features: 256
      out_channels: [256, 512, 1024, 1024]
      intermediate_layer_idx: [4, 11, 17, 23]
      # pos_embed: False
      predict_mask: False
      mask_activation: "none"
      # disable_conf: True
      pos_embed: True

    POINT_HEAD:
      _target_: vggt.models.heads.dpt_head.DPTHead
      dim_in: 2048
      output_dim: 4
      activation: "inv_log"
      conf_activation: "expp1"
      patch_size: ${patch_size}
      features: 256
      out_channels: [256, 512, 1024, 1024]
      intermediate_layer_idx: [4, 11, 17, 23]
      # pos_embed: False
      predict_mask: False
      mask_activation: "none"
      # disable_conf: True
      pos_embed: True

    RAY_HEAD: null
    MATCH_HEAD: null

  cuda:
    allow_tf32: False
    cudnn_deterministic: False
    cudnn_benchmark: False

  checkpoint:
    save_freq: 1
    model_weight_initializer:
      _partial_: True
      _target_: omnivision.model.checkpoint_utils.load_state_dict_into_model
      strict: False
      state_dict:
        _target_: omnivision.model.checkpoint_utils.load_multiple_checkpoints_and_apply_kernels
        checkpoints:
          - checkpoint_path: /checkpoint/amaia/scale/jianyuan/vggt/config/experiments/cw/restart_r256_include_patience_match_t12.yaml/0/checkpoints/checkpoint.pt
            ckpt_state_dict_keys:
              - model
            checkpoint_kernels:
              - _target_: omnivision.model.checkpoint_utils.CkptExcludeKernel
                key_pattern:
                  - "*depth_head*"
                  - "*point_head*"
                  # - "*depth_head.scratch.output_conv2.2*"
                  # - "*point_head.scratch.output_conv2.2*"

  accum_steps: 1
  visual_viser: False
  val_epoch_freq: 200
  seed_value: ${seed_value}

  max_epochs: 120
  limit_train_batches: 1000
  limit_val_batches: 100

  optim:
    filter_bias_and_bn: True

    # frozen_module_names:
    #   - "*patch_embed*"

    optimizer:
      _target_: torch.optim.AdamW
      lr: ${base_lr}
      weight_decay: 0.05
      betas: [0.9, 0.95]

    amp:
      enabled: True

    gradient_clip:
      _target_: vggt.utils.gradient_clip.GradientClipper
      configs:
        - module_name: ["aggregator", "patch_embed"]
          max_norm: 1.0
          norm_type: 2
        - module_name: ["depth_head"]
          max_norm: 1.0
          norm_type: 2
        - module_name: ["point_head"]
          max_norm: 1.0
          norm_type: 2
        - module_name: ["camera_head"]
          max_norm: 1.0
          norm_type: 2

    options:
      lr:
        # Default LR schedule for all non-patch-embed parameters.
        # 0-10%: linear warmup, 10-100%: cosine decay.
        - scheduler:
            _target_: fvcore.common.param_scheduler.CompositeParamScheduler
            schedulers:
              - _target_: fvcore.common.param_scheduler.LinearParamScheduler
                start_value: ${min_lr}
                end_value: ${base_lr}
              - _target_: fvcore.common.param_scheduler.CosineParamScheduler
                start_value: ${base_lr}
                end_value: ${min_lr}
            lengths: [0.05, 0.95]
            interval_scaling: ['rescaled', 'rescaled']
        # Patch embed uses 0.1x of the default LR schedule.
        # 0-10%: linear warmup, 10-100%: cosine decay.
        - scheduler:
            _target_: fvcore.common.param_scheduler.CompositeParamScheduler
            schedulers:
              - _target_: fvcore.common.param_scheduler.LinearParamScheduler
                start_value: ${patch_min_lr}
                end_value: ${patch_base_lr}
              - _target_: fvcore.common.param_scheduler.CosineParamScheduler
                start_value: ${patch_base_lr}
                end_value: ${patch_min_lr}
            lengths: [0.05, 0.95]
            interval_scaling: ['rescaled', 'rescaled']
          param_names:
            - "*patch_embed*"
      weight_decay:
        - scheduler:
            _target_: fvcore.common.param_scheduler.ConstantParamScheduler
            value: 0.05


#################
# Loss Configuration
#################
  loss:
    _target_: vggt.losses.loss.MultitaskLoss
    ####################################################################################################
    # DO NOT DO NORMALIZATION!
    normalize_predictions: False # True
    normalization_type: "global"
    normalize_gt: null # "global"
    mean_type: "arithmetic"
    align_pred_to_gt: False 
    #################################################################################################### 
    verbose: False
    intrinsics_warmup_ratio: 0.95
    rel_to_first_cam: False # Pi3 Does not use rel_to_first_cam to the predictions
    align_resolution: 8192
    camera:
      weight: 5.0
      ####################################################################################################
      # weight_pairwise: 0.5
      # pairwise_rotation_loss_type: "chordal"
      # pairwise_translation_loss_type: "l1_robust_direction"
      # pairwise_weight_rotation: 1.0
      # pairwise_weight_translation: 1.0
      ####################################################################################################
      loss_type: "l1_consistent"
      weight_trans: 1.0
      weight_rot: 1.0
      weight_focal: 0.5
      normalize_trans_by_gt_scale: True
      pose_encoding_type: "absT_quaR_FoV"
    depth:
      weight: 2.0
      loss_space: "depth"
      # skip_unprojection_for_depth_grad_loss: True
      weight_normal: 1.0
      min_valid_pts: 100
      abs_l1_loss_ratio: 1.0
      rel_l1_loss_ratio: 0
      use_conf_loss: True
      conf_alpha: 0.2
      add_separate_reg_loss: True
      separate_reg_loss_weight: 1.0
      apply_aux_loss_to_synthetic_only: True
      valid_range: 0.98
      gradient_loss_config:
        - type: "normal"
          scales: 2
          min_valid_samples: 10
          weight: 1.0
        - type: "grad"
          scales: 4
          weight: 1.0
    point: null
      # weight: 10.0
      # weight_normal: 1.0
      # abs_l1_loss_ratio: 1.0
      # rel_l1_loss_ratio: 0
      # use_conf_loss: True
      # valid_range: -1 #0.995 #-1 #0.995
      # detach_conf_for_loss: True
      # gradient_loss_config:
      #   - type: "normal_pi"
      #     scales: 1
      #     weight: 0.002
    # point:                                                                                                                                                                 
    #   weight: 2.0                                                                                                                                                          
    #   weight_normal: 1.0                                                                                                                                                   
    #   min_valid_pts: 100                                                                                                                                                   
    #   abs_l1_loss_ratio: 1.0                                                                                                                                               
    #   rel_l1_loss_ratio: 0                                                                                                                                                 
    #   use_conf_loss: True                                                                                                                                                  
    #   conf_alpha: 0.2                                                                                                                                                      
    #   add_separate_reg_loss: True                                                                                                                                          
    #   separate_reg_loss_weight: 1.0
    #   apply_aux_loss_to_synthetic_only: True
    #   valid_range: 0.98
    #   detach_conf_for_loss: True
    #   gradient_loss_config:
    #     - type: "normal"
    #       scales: 2
    #       min_valid_samples: 10
    #       weight: 1.0
    preg:
      weight: 1.0
      weight_normal: 1.0
      min_valid_pts: 100
      abs_l1_loss_ratio: 1.0
      rel_l1_loss_ratio: 0
      use_conf_loss: True
      conf_alpha: 0.2
      add_separate_reg_loss: True
      separate_reg_loss_weight: 1.0
      apply_aux_loss_to_synthetic_only: True
      valid_range: 0.98
      normalize_by_scale: False
      gradient_loss_config:
        - type: "normal"
          scales: 3
          min_valid_samples: 10
          weight: 1.0
    track: null
      # weight: 10.0
    mask: null
      # weight: 5.0
      # loss_type: "bce"
    ray: null
    match: null

#################
# Data Loading
#################
  data:
    train:
      _target_: vggt.data.dynamic_dataloader.DynamicTorchDataset
      num_workers: ${num_workers}
      use_spawn: ${use_spawn}
      dyna_ratio: ${dyna_ratio}
      sync_image_num: False
      sync_node: False
      persistent_workers: False
      reuse_dataloader: False
      seed: ${seed_value}
      shuffle: ${shuffle}
      pin_memory: True
      common_config:
        sample_dict: "s2"
        ratio_dict: "s2"
        img_size: ${img_size}
        patch_size: ${patch_size}
        debug: ${debug}
        repeat_batch: False
        # default_max_percentage_depth: 96
        # img_nums: [2, 16]
        # img_nums: [2, 16]
        img_nums: [2, 8]
        aug_principal_point: True
        same_preprocess_ratio: 0.05
        random_rotation_ratio: 0.02 # -1 # 0.01 # TO BE APPLIED IN LATER PHASES
        random_patch_mask_size: 128
        random_patch_mask_ratio: -1 # 0.05 # -1
        load_track: ${load_track}
        track_num: ${track_num}
        load_similarity: ${load_similarity}
        synt_ratio: ${synt_ratio}
        g_ratio: ${g_ratio}
        len_multiplier: ${len_multiplier}
        load_ray_map: False
        thread_io_worker_num: -1
        # thread_io_worker_num: 10
        # thread_io_worker_num: 4
        # rescale_prob: 0.9
        augs:
          enable_image_aug: True # True
          aspects: [0.5, 2.0]
          use_discrete_aspect_ratios: False # TODO: CHECK HERE
          # TODO, RANDOM SAME SAMPLE
          cojitter_ratio: 0.5
          jpeg_compression: 0.02
          low_res_blur: 0.02
          color_jitter:
            brightness: 0.65
            contrast: 0.65
            saturation: 0.5
            hue: 0.1
            p: 0.9
        compute_invalid_area: False
        adaptive_step_range: True
        adaptive_step_range_base: 8
        # joint_step_ratio: 0.6
        joint_step_ratio: 1.0
        enable_sky_mask: True
        enable_human_mask: True
        enable_edge_rtol_thres: False
        skip_extreme_rescale: False # DO NOT use skip_extreme_rescale any more
        # fixed_base_side: True
        # shared_intrinsics_resize_scale: True
        randomize_token_number: False
        # avoid_upsample: True # Instead, we use avoid_upsample to prevent upsampling
      dataset:
        _target_: vggt.data.composed_dataset.ComposedDataset
    val:
      _target_: vggt.data.dynamic_dataloader.DynamicTorchDataset
      num_workers: ${num_workers}
      sync_image_num: False
      use_spawn: ${use_spawn}
      shuffle: ${shuffle}
      pin_memory: True
      seed: ${seed_value}
      common_config:
        sample_dict: "s2"
        ratio_dict: "s2"
        img_size: ${img_size}
        patch_size: ${patch_size}
        debug: ${debug}
        load_track: ${load_track}
        # default_max_percentage_depth: 96
        track_num: ${track_num}
        load_similarity: ${load_similarity}
        synt_ratio: ${synt_ratio}
        g_ratio: ${g_ratio}
        load_ray_map: False
        thread_io_worker_num: -1
        compute_invalid_area: False
        adaptive_step_range: True
        adaptive_step_range_base: 8
        # joint_step_ratio: 0.6
        joint_step_ratio: 1.0
        enable_sky_mask: True
        enable_human_mask: True
        skip_extreme_rescale: False # DO NOT use skip_extreme_rescale any more
        # shared_intrinsics_resize_scale: True
        # fixed_base_side: True
        # avoid_upsample: True # Instead, we use avoid_upsample to prevent upsampling
      dataset:
        _target_: vggt.data.composed_dataset.ComposedDataset


  logging:
    # log_visual_frequency:
    #   train: 500
    #   val: 500
    scalar_keys_to_log:
      train:
        keys_to_log:
          - loss_obj
          - mean_depth_raw
          # Camera
          - loss_camera
          - loss_T
          - loss_R
          - loss_FL
          - loss_PP
          - loss_VP
          - loss_PW
          - pred_T_max
          # Camera Metrics
          - Rac_5
          - Rac_15
          - Tac_5
          - Tac_15
          - Auc_3
          - Auc_5
          - Auc_10
          - Auc_30
          # Depth
          - loss_depth
          - loss_pts_l1
          - depth_l1_unweighted
          - loss_pts_l1_max
          - loss_normal
          - loss_conf_depth
          - depth_conf_median
          # Depth Metrics
          - d1
          - d2
          - d3
          - abs_rel
          - sq_rel
          - rmse
          - rmse_log
          # Mask
          - loss_mask
          - mask_pos_ratio
          # Point
          - loss_point
          - loss_point_l1
          - point_l1_unweighted
          - loss_point_l1_max
          - loss_point_normal
          # Point Reg
          - loss_preg
          - loss_preg_l1
          - preg_l1_unweighted
          - loss_preg_l1_max
          - loss_preg_normal
          # Consistency
          - loss_consistency
          - loss_consistency_max
          - consistency_valid_count
      val:
        keys_to_log:
          - loss_obj
          - mean_depth_raw
          # Camera
          - loss_camera
          - loss_T
          - loss_R
          - loss_FL
          - loss_PP
          - loss_VP
          - loss_PW
          - pred_T_max
          # Camera Metrics
          - Rac_5
          - Rac_15
          - Tac_5
          - Tac_15
          - Auc_3
          - Auc_5
          - Auc_10
          - Auc_30
          # Depth
          - loss_depth
          - loss_pts_l1
          - depth_l1_unweighted
          - loss_pts_l1_max
          - loss_normal
          - loss_conf_depth
          - depth_conf_median
          # Depth Metrics
          - d1
          - d2
          - d3
          - abs_rel
          - sq_rel
          - rmse
          - rmse_log
          # Mask
          - loss_mask
          - mask_pos_ratio
          # Point
          - loss_point
          - loss_point_l1
          - point_l1_unweighted
          - loss_point_l1_max
          - loss_point_normal
          # Point Reg
          - loss_preg
          - loss_preg_l1
          - preg_l1_unweighted
          - loss_preg_l1_max
          - loss_preg_normal
          # Consistency
          - loss_consistency
          - loss_consistency_max
          - consistency_valid_count
