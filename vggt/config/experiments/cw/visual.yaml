# @package _global_
#








dataset_name: &dataset_name interiornet











defaults:
  - /experiments/base/base_train
  - /experiments/models_v2/vggt_1b@trainer.model
  # - /experiments/cw/datasets/scannetpp@trainer.data.train.dataset.dataset_configs.scannetpp
  # - /experiments/cw/datasets/scannetpp_test@trainer.data.val.dataset.dataset_configs.scannetpp_test
  # - /experiments/cw/datasets/uedec@trainer.data.train.dataset.dataset_configs.uedec
  # - /experiments/cw/datasets/uedec@trainer.data.val.dataset.dataset_configs.uedec
  # - /experiments/cw/datasets/uedec@trainer.data.train.dataset.dataset_configs.uedec
  # - /experiments/cw/datasets/uedec@trainer.data.val.dataset.dataset_configs.uedec
  # - /experiments/cw/datasets/ue@trainer.data.train.dataset.dataset_configs.ue
  # - /experiments/cw/datasets/ue@trainer.data.val.dataset.dataset_configs.ue
  # - /experiments/cw/datasets/dyna_v1@trainer.data.train.dataset.dataset_configs.dyna_v1
  # - /experiments/cw/datasets/dyna_v1@trainer.data.val.dataset.dataset_configs.dyna_v1
  # - /experiments/cw/dataset_mix_v6
  - /experiments/cw/datasets_synt@trainer.data.train.dataset.dataset_configs.selected: *dataset_name
  - /experiments/cw/datasets_synt@trainer.data.val.dataset.dataset_configs.selected: *dataset_name
  - _self_






#################
# Global Variables
#################
use_spawn: True
debug: False
img_size: 512
patch_size: 16
num_workers: 10
load_track: False
load_similarity: False
# synt_ratio: 0.5
synt_ratio: 0.3
g_ratio: 0.5
track_num: 512
shuffle: True
seed_value: 1024

base_lr: 1e-4
mid_lr: 5e-5
min_lr: 1e-10
patch_base_lr: 1e-5
patch_mid_lr: 2.5e-6
patch_min_lr: 1e-11
dyna_ratio: 0.5
aggregator_register_num: 8
use_flash_attn: True


#################
# Submitit Configuration
#################
submitit:
  name: "omegav1_linear"
  timeout_min: 8000
  cpus_per_task: 12
  account: "fair_amaia_cw_explore"
  qos: "explore"
  mem_gb: 0
  use_cluster: True
  partition: learn


#################
# Launcher Configuration
#################
launcher:
  gpus_per_node: 8
  num_nodes: 4


#################
# Trainer Configuration
#################
trainer:
  model:
    norm_denominator: 50
    AGGREGATOR:
      use_flash_attn: ${use_flash_attn}

    CAMERA_HEAD: null
      # _target_: vggt.models.heads.camera_head_linear.CameraHeadLinear
      # dim_in: 2048
      # pose_encoding_type: "absT_quaR_FoV"
      # mlp_ratio: [0.5]
      # patch_size: ${patch_size}
      # extra_attention_depth: 4
      # use_checkpoint: False
      # # use_flash_attn: ${use_flash_attn} # NOTE Flash ATT V3 does not support FP32
      # disable_last_layer_amp: True

    DEPTH_HEAD:
      _target_: vggt.models.heads.linear_variants.vgglinearhead.VGGLinearHead
      dim_in: 2048
      output_dim: 2
      activation: "exp"
      conf_activation: "softplus_0.5_10"
      patch_size: ${patch_size}
      proj_type: "linear"
      mlp_ratio: 0.5
      predict_mask: False
      disable_last_layer_amp: True

    POINT_HEAD: null
    RAY_HEAD: null
    MATCH_HEAD: null

  cuda:
    allow_tf32: False
    cudnn_deterministic: False
    cudnn_benchmark: False

  # checkpoint:
  #   save_freq: 10
  #   model_weight_initializer:
  #     _partial_: True
  #     _target_: omnivision.model.checkpoint_utils.load_state_dict_into_model
  #     strict: False
  #     state_dict:
  #       _target_: omnivision.model.checkpoint_utils.load_multiple_checkpoints_and_apply_kernels
  #       checkpoints:
  #         - checkpoint_path: /checkpoint/amaia/explore/jianyuan/ckpts/transfer/omega_v2_base_cam_0-rw0jbw6m/checkpoint.pt
  #           ckpt_state_dict_keys:
  #           - model
  #           checkpoint_kernels:
  #             - _target_: omnivision.model.checkpoint_utils.CkptExcludeKernel
  #               key_pattern:
  #                 - "*head*"


  accum_steps: 1
  visual_viser: True
  val_epoch_freq: 20
  seed_value: ${seed_value}

  max_epochs: 40
  limit_train_batches: 1000
  limit_val_batches: 100

  optim:
    filter_bias_and_bn: True
    frozen_module_names:
      - "*patch_embed*"
      - "*aggregator*"
    optimizer:
      _target_: torch.optim.AdamW
      lr: ${base_lr}
      weight_decay: 0.05
      betas: [0.9, 0.95]

    amp:
      enabled: True

    gradient_clip:
      _target_: vggt.utils.gradient_clip.GradientClipper
      configs:
        # - module_name: ["aggregator", "patch_embed"]
        #   max_norm: 1.0
        #   norm_type: 2
        - module_name: ["head"]
          max_norm: 1.0
          norm_type: 2

    options:
      lr:
        # Non-head parameters use 0.1x LR.
        - scheduler:
            _target_: fvcore.common.param_scheduler.CompositeParamScheduler
            schedulers:
              - _target_: fvcore.common.param_scheduler.LinearParamScheduler
                start_value: ${patch_min_lr}
                end_value: ${patch_base_lr}
              - _target_: fvcore.common.param_scheduler.CosineParamScheduler
                start_value: ${patch_base_lr}
                end_value: ${patch_min_lr}
            lengths: [0.05, 0.95]
            interval_scaling: ['rescaled', 'rescaled']
        # Head parameters use full LR.
        - scheduler:
            _target_: fvcore.common.param_scheduler.CompositeParamScheduler
            schedulers:
              - _target_: fvcore.common.param_scheduler.LinearParamScheduler
                start_value: ${min_lr}
                end_value: ${base_lr}
              - _target_: fvcore.common.param_scheduler.CosineParamScheduler
                start_value: ${base_lr}
                end_value: ${min_lr}
            lengths: [0.05, 0.95]
            interval_scaling: ['rescaled', 'rescaled']
          param_names:
            - '*head*'
      weight_decay:
        - scheduler:
            _target_: fvcore.common.param_scheduler.ConstantParamScheduler
            value: 0.05


#################
# Loss Configuration
#################
  loss:
    _target_: vggt.losses.loss.MultitaskLoss
    normalize_predictions: False
    normalization_type: "global"
    normalize_gt: Null
    verbose: False
    intrinsics_warmup_ratio: 0.5
    rel_to_first_cam: False # Pi3 Does not use rel_to_first_cam to the predictions
    align_pred_to_gt: False 
    align_resolution: 8192
    mean_type: "geometric"
    camera: null
      # weight: 10.0
      # weight_pairwise: 0.0
      # loss_type: "l1" # "l1_consistent"
      # weight_trans: 2.0
      # weight_rot: 1.0
      # weight_focal: 1.0
      # normalize_trans_by_gt_scale: True
      # pose_encoding_type: "absT_quaR_FoV"
    depth:
      weight: 1.0
      weight_normal: 0.25
      abs_l1_loss_ratio: 2.0
      rel_l1_loss_ratio: 0.1
      use_conf_loss: True
      conf_alpha: 0.1
      # use_gt_var_weighting: True
      # valid_range: 0.99
      gradient_loss_config:
        - type: "normal"
          scales: 3
          weight: 0.1
        # - type: "edge_aware"
        #   scales: 1
        #   weight: 0.25
        - type: "grad"
          scales: 5
    point: null
      # weight: 0.5
      # weight_normal: 0.25
      # abs_l1_loss_ratio: 2.0
      # rel_l1_loss_ratio: 0.1
      # use_conf_loss: True
      # # valid_range: 0.99
      # detach_conf_for_loss: True
      # gradient_loss_config:
      #   - type: "normal"
      #     scales: 3
      #     weight: 0.1
    preg: null
      # valid_range: 0.99
    track: null
      # weight: 1.0
      # weight: 1.0  
      # valid_range: 0.99
    mask: null
      # weight: 0.5
      # loss_type: "bce"
    ray: null
    match: null

#################
# Data Loading
#################
  data:
    train:
      _target_: vggt.data.dynamic_dataloader.DynamicTorchDataset
      num_workers: ${num_workers}
      use_spawn: ${use_spawn}
      dyna_ratio: ${dyna_ratio}
      sync_image_num: False
      sync_node: False
      persistent_workers: False
      reuse_dataloader: False
      seed: ${seed_value}
      shuffle: ${shuffle}
      pin_memory: True
      common_config:
        sample_dict: "s1"
        ratio_dict: "s1"
        img_size: ${img_size}
        patch_size: ${patch_size}
        debug: ${debug}
        repeat_batch: False
        img_nums: [2, 24]
        aug_principal_point: True
        random_rotation_ratio: -1 # -1 # 0.01 # TO BE APPLIED IN LATER PHASES
        random_patch_mask_size: 128
        random_patch_mask_ratio: -1
        load_track: ${load_track}
        track_num: ${track_num}
        load_similarity: ${load_similarity}
        synt_ratio: ${synt_ratio}
        g_ratio: ${g_ratio}
        load_ray_map: False
        thread_io_worker_num: -1
        # rescale_prob: 0.9
        augs:
          enable_image_aug: False # True
          aspects: [0.5, 2.0]
          cojitter_ratio: 0.5
          jpeg_compression: 0.2
          low_res_blur: 0.2
          color_jitter:
            brightness: 0.65
            contrast: 0.65
            saturation: 0.5
            hue: 0.1
            p: 0.9
        compute_invalid_area: False
        adaptive_step_range: True
        adaptive_step_range_base: 8
        joint_step_ratio: 1.0
        skip_extreme_rescale: False # DO NOT use skip_extreme_rescale any more
        # avoid_upsample: True # Instead, we use avoid_upsample to prevent upsampling
      dataset:
        _target_: vggt.data.composed_dataset.ComposedDataset
    val:
      _target_: vggt.data.dynamic_dataloader.DynamicTorchDataset
      num_workers: ${num_workers}
      sync_image_num: False
      use_spawn: ${use_spawn}
      shuffle: ${shuffle}
      pin_memory: True
      seed: ${seed_value}
      common_config:
        sample_dict: "s1"
        ratio_dict: "s1"
        img_size: ${img_size}
        patch_size: ${patch_size}
        debug: ${debug}
        load_track: ${load_track}
        track_num: ${track_num}
        load_similarity: ${load_similarity}
        synt_ratio: ${synt_ratio}
        g_ratio: ${g_ratio}
        load_ray_map: False
        thread_io_worker_num: -1
        compute_invalid_area: False
        adaptive_step_range: True
        adaptive_step_range_base: 8
        joint_step_ratio: 1.0
        skip_extreme_rescale: False # DO NOT use skip_extreme_rescale any more
        # avoid_upsample: True # Instead, we use avoid_upsample to prevent upsampling
      dataset:
        _target_: vggt.data.composed_dataset.ComposedDataset


  logging:
    scalar_keys_to_log:
      train:
        keys_to_log:
          - loss_obj
          - mean_depth_raw
          # Depth
          - loss_depth
          - loss_pts_l1
          - loss_pts_l1_max
          - loss_normal
          - loss_conf_depth
          - depth_conf_median
          # Depth Metrics
          - d1
          - d2
          - d3
          - abs_rel
          - sq_rel
          - rmse
          - rmse_log
      val:
        keys_to_log:
          - loss_obj
          - mean_depth_raw
          # Depth
          - loss_depth
          - loss_pts_l1
          - loss_pts_l1_max
          - loss_normal
          - loss_conf_depth
          - depth_conf_median
          # Depth Metrics
          - d1
          - d2
          - d3
          - abs_rel
          - sq_rel
          - rmse
          - rmse_log






