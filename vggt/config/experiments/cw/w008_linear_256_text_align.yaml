# @package _global_
#


# VGGT + text alignment branch

defaults:
  - /experiments/base/base_train
  - /experiments/models_restart/vggt_1b@trainer.model
  - /experiments/cw/dataset_mix_restart_v8_t2_256_pub
  - /experiments/cw/submitit/exclude_nodes@submitit
  # - /experiments/cw/datasets/overfit@trainer.data.train.dataset.dataset_configs.overfit
  # - /experiments/cw/datasets/overfit@trainer.data.val.dataset.dataset_configs.overfit

#################
# Global Variables
#################
use_spawn: True
debug: False
img_size: 256
patch_size: 16
num_workers: 8
load_track: True
load_similarity: False
synt_ratio: 0.6
g_ratio: 1.0
len_multiplier: 2000
track_num: 512
shuffle: True
seed_value: 10248

base_lr: 2.5e-5
min_lr: 5e-8
patch_base_lr: 2.5e-6
patch_min_lr: 5e-9
align_base_lr: 5e-5
align_min_lr: 5e-8
dyna_ratio: 1.0
aggregator_register_num: 16
use_flash_attn: True

align_loss_weight: 0.1
align_loss_type: "infonce"
align_temperature: 0.07
align_symmetric: True
align_cross_gpu_negatives: True
align_embedding_dim: -1
align_teacher_model_name: "Qwen/Qwen3-VL-2B-Instruct"
align_teacher_projector_type: "identity"
align_teacher_attn_implementation: "sdpa"
align_teacher_log_text: True


#################
# Submitit Configuration
#################
submitit:
  name: "w008_linear_256_text_align"
  timeout_min: 8000
  cpus_per_task: 12
  account: "fair_amaia_cw_scale"
  qos: "scale"
  mem_gb: 0
  use_cluster: True
  partition: learn


#################
# Launcher Configuration
#################
launcher:
  gpus_per_node: 8
  num_nodes: 16


#################
# Trainer Configuration
#################
trainer:
  model:
    force_rope_normalize_coords_max: True

    AGGREGATOR:
      use_flash_attn: ${use_flash_attn}
      use_dino_clsreg: False

    CAMERA_HEAD:
      _target_: vggt.models.heads.camera_head_linear.CameraHeadLinear
      dim_in: 2048
      pose_encoding_type: "absT_quaR_FoV"
      mlp_ratio: [0.5]
      patch_size: ${patch_size}
      extra_attention_depth: 4
      extra_attention_dim: -1
      extra_attention_pre_norm: True
      extra_attention_post_norm: True
      extra_attention_use_qk_norm: False
      use_checkpoint: False
      disable_last_layer_amp: True

    DEPTH_HEAD:
      _target_: vggt.models.heads.dpt_linear_head.DPTLinearHead
      dim_in: 2048
      output_dim: 2
      activation: "exp"
      conf_activation: "expp1"
      patch_size: ${patch_size}
      features: 256
      out_channels: [256, 512, 1024, 1024]
      intermediate_layer_idx: [4, 11, 17, 23]
      predict_mask: False
      mask_activation: "none"
      pos_embed: True
      use_patch_embed_intermediate: False
      disable_last_layer_amp: True
      proj_type: "linear"
      mlp_ratio: 0.5
      fusion_block_relu_inplace: False

    POINT_HEAD: null
    RAY_HEAD: null
    MATCH_HEAD: null

    ALIGNMENT_HEAD:
      _target_: vggt.models.heads.text_alignment_head.TextAlignmentHead
      compute_teacher: True
      compute_student_on_eval: False
      STUDENT:
        _target_: vggt.models.heads.text_alignment_head.SequenceAlignmentStudent
        dim_in: 2048
        embedding_dim: ${align_embedding_dim}
        projector_mlp_ratio: [0.5]
        attention_depth: 4
        attention_dim: -1
        attention_num_heads: 16
        attention_mlp_ratio: 4.0
        attention_use_qk_norm: False
        attention_pre_norm: True
        attention_post_norm: True
        disable_last_layer_amp: True
        use_checkpoint: False
      TEACHER:
        _target_: vggt.models.heads.text_alignment_head.QwenVLTeacher
        model_name: ${align_teacher_model_name}
        embedding_dim: ${align_embedding_dim}
        projector_mlp_ratio: [0.5]
        projector_type: ${align_teacher_projector_type}
        torch_dtype: "bfloat16"
        attn_implementation: ${align_teacher_attn_implementation}
        max_new_tokens: 128
        do_sample: True
        temperature: 0.3
        top_p: 0.85
        top_k: null
        repetition_penalty: 1.05
        compute_on_eval: False
        log_text: ${align_teacher_log_text}

  cuda:
    allow_tf32: False
    cudnn_deterministic: False
    cudnn_benchmark: False

  checkpoint:
    save_freq: 1
    model_weight_initializer:
      _partial_: True
      _target_: omnivision.model.checkpoint_utils.load_state_dict_into_model
      strict: False
      state_dict:
        _target_: omnivision.model.checkpoint_utils.load_multiple_checkpoints_and_apply_kernels
        checkpoints:
          - checkpoint_path: /checkpoint/amaia/scale/jianyuan/vggt/config/experiments/cw/w008_linear_256_plz.yaml/0/checkpoints/checkpoint.pt
            ckpt_state_dict_keys:
              - model

  accum_steps: 1
  visual_viser: False
  val_epoch_freq: 220
  seed_value: ${seed_value}

  max_epochs: 40
  limit_train_batches: 500
  limit_val_batches: 100

  optim:
    filter_bias_and_bn: True

    optimizer:
      _target_: torch.optim.AdamW
      lr: ${base_lr}
      weight_decay: 0.05
      betas: [0.9, 0.95]

    amp:
      enabled: True

    gradient_clip:
      _target_: vggt.utils.gradient_clip.GradientClipper
      configs:
        - module_name: ["aggregator", "patch_embed"]
          max_norm: 1.0
          norm_type: 2
        - module_name: ["depth_head"]
          max_norm: 1.0
          norm_type: 2
        - module_name: ["point_head"]
          max_norm: 1.0
          norm_type: 2
        - module_name: ["camera_head"]
          max_norm: 1.0
          norm_type: 2
        - module_name: ["alignment_head"]
          max_norm: 1.0
          norm_type: 2

    options:
      lr:
        - scheduler:
            _target_: fvcore.common.param_scheduler.CompositeParamScheduler
            schedulers:
              - _target_: fvcore.common.param_scheduler.LinearParamScheduler
                start_value: ${min_lr}
                end_value: ${base_lr}
              - _target_: fvcore.common.param_scheduler.CosineParamScheduler
                start_value: ${base_lr}
                end_value: ${min_lr}
            lengths: [0.05, 0.95]
            interval_scaling: ["rescaled", "rescaled"]
        - scheduler:
            _target_: fvcore.common.param_scheduler.CompositeParamScheduler
            schedulers:
              - _target_: fvcore.common.param_scheduler.LinearParamScheduler
                start_value: ${patch_min_lr}
                end_value: ${patch_base_lr}
              - _target_: fvcore.common.param_scheduler.CosineParamScheduler
                start_value: ${patch_base_lr}
                end_value: ${patch_min_lr}
            lengths: [0.05, 0.95]
            interval_scaling: ["rescaled", "rescaled"]
          param_names:
            - "*patch_embed*"
        - scheduler:
            _target_: fvcore.common.param_scheduler.CompositeParamScheduler
            schedulers:
              - _target_: fvcore.common.param_scheduler.LinearParamScheduler
                start_value: ${align_min_lr}
                end_value: ${align_base_lr}
              - _target_: fvcore.common.param_scheduler.CosineParamScheduler
                start_value: ${align_base_lr}
                end_value: ${align_min_lr}
            lengths: [0.05, 0.95]
            interval_scaling: ["rescaled", "rescaled"]
          param_names:
            - "*alignment_head.student*"
      weight_decay:
        - scheduler:
            _target_: fvcore.common.param_scheduler.ConstantParamScheduler
            value: 0.05


  loss:
    _target_: vggt.losses.loss.MultitaskLoss
    normalize_predictions: False
    normalization_type: "global"
    normalize_gt: null
    mean_type: "arithmetic"
    align_pred_to_gt: False
    verbose: False
    intrinsics_warmup_ratio: 0.5
    rel_to_first_cam: False
    align_resolution: 8192
    camera:
      weight: 4.0
      weight_pairwise: 0.5
      pairwise_rotation_loss_type: "chordal"
      pairwise_translation_loss_type: "l1_robust_direction"
      pairwise_weight_rotation: 1.0
      pairwise_weight_translation: 1.0
      loss_type: "l1_consistent"
      weight_trans: 1.0
      weight_rot: 1.0
      weight_focal: 0.5
      normalize_trans_by_gt_scale: True
      pose_encoding_type: "absT_quaR_FoV"
    depth:
      weight: 2.0
      loss_space: "depth"
      weight_normal: 1.0
      min_valid_pts: 100
      abs_l1_loss_ratio: 1.0
      rel_l1_loss_ratio: 0.1
      use_conf_loss: True
      conf_alpha: 0.2
      add_separate_reg_loss: True
      separate_reg_loss_weight: 2.0
      apply_aux_loss_to_synthetic_only: True
      valid_range: 0.99
      gradient_loss_config:
        - type: "normal_pi"
          scales: 1
          min_valid_samples: 100
          weight: 0.1
        - type: "grad"
          scales: 4
          weight: 1.0
    point:
      weight: 5.0
      weight_normal: 0.0
      min_valid_pts: 100
      abs_l1_loss_ratio: 1.0
      rel_l1_loss_ratio: 0
      use_conf_loss: True
      conf_alpha: 0.2
      add_separate_reg_loss: True
      separate_reg_loss_weight: 1.0
      apply_aux_loss_to_synthetic_only: True
      valid_range: 0.99
      detach_conf_for_loss: True
      gradient_loss_config: null
    preg: null
    track:
      weight: 5.0
    mask: null
    ray: null
    match: null
    alignment:
      weight: ${align_loss_weight}
      loss_type: ${align_loss_type}
      temperature: ${align_temperature}
      symmetric: ${align_symmetric}
      cross_gpu_negatives: ${align_cross_gpu_negatives}
      reduction: "mean"

  data:
    train:
      _target_: vggt.data.dynamic_dataloader.DynamicTorchDataset
      num_workers: ${num_workers}
      use_spawn: ${use_spawn}
      dyna_ratio: ${dyna_ratio}
      sync_image_num: False
      sync_node: False
      persistent_workers: False
      reuse_dataloader: False
      seed: ${seed_value}
      shuffle: ${shuffle}
      pin_memory: True
      common_config:
        sample_dict: "s2"
        ratio_dict: "s2"
        img_size: ${img_size}
        patch_size: ${patch_size}
        debug: ${debug}
        repeat_batch: False
        img_nums: [1, 16]
        aug_principal_point: True
        same_preprocess_ratio: 0.02
        random_rotation_ratio: -1
        random_patch_mask_size: 128
        random_patch_mask_ratio: -1
        load_track: ${load_track}
        track_num: ${track_num}
        load_similarity: ${load_similarity}
        synt_ratio: ${synt_ratio}
        g_ratio: ${g_ratio}
        len_multiplier: ${len_multiplier}
        load_ray_map: False
        thread_io_worker_num: 4
        augs:
          enable_image_aug: True
          aspects: [0.5, 2.0]
          use_discrete_aspect_ratios: True
          cojitter_ratio: 0.0
          jpeg_compression: 0.02
          low_res_blur: 0.02
          color_jitter:
            brightness: 0.65
            contrast: 0.65
            saturation: 0.5
            hue: 0.1
            p: 0.9
        compute_invalid_area: False
        adaptive_step_range: True
        adaptive_step_range_base: 8
        joint_step_ratio: 1.0
        enable_sky_mask: True
        enable_human_mask: True
        enable_edge_rtol_thres: False
        skip_extreme_rescale: False
        randomize_token_number: False
      dataset:
        _target_: vggt.data.composed_dataset.ComposedDataset
        dataset_configs:
          blendmvs:
            valid_mask_erode_iters: 1
          uco3d:
            valid_mask_erode_iters: 1
          gen2pilot:
            disable_depth_loss: True
          se_col:
            disable_depth_loss: True
            len_dataset_scale: 0.3
          rigid_v1_top50:
            mask_dilate_iters: 5
            valid_mask_erode_iters: 1
            len_dataset_scale: 0.5
          rigid_v2_uncertain:
            mask_dilate_iters: 1
            disable_depth_loss: True
          dl3dv:
            mask_dilate_iters: 2
            valid_mask_erode_iters: 1
    val:
      _target_: vggt.data.dynamic_dataloader.DynamicTorchDataset
      num_workers: ${num_workers}
      sync_image_num: False
      use_spawn: ${use_spawn}
      shuffle: ${shuffle}
      pin_memory: True
      seed: ${seed_value}
      common_config:
        sample_dict: "s2"
        ratio_dict: "s2"
        img_size: ${img_size}
        patch_size: ${patch_size}
        debug: ${debug}
        load_track: ${load_track}
        track_num: ${track_num}
        load_similarity: ${load_similarity}
        synt_ratio: ${synt_ratio}
        g_ratio: ${g_ratio}
        load_ray_map: False
        thread_io_worker_num: -1
        compute_invalid_area: False
        adaptive_step_range: True
        adaptive_step_range_base: 8
        joint_step_ratio: 1.0
        enable_sky_mask: True
        enable_human_mask: True
        skip_extreme_rescale: False
      dataset:
        _target_: vggt.data.composed_dataset.ComposedDataset

  logging:
    scalar_keys_to_log:
      train:
        keys_to_log:
          - loss_obj
          - mean_depth_raw
          - loss_align
          - align_cosine
          - loss_camera
          - loss_T
          - loss_R
          - loss_FL
          - loss_PP
          - loss_VP
          - loss_PW
          - pred_T_max
          - Rac_5
          - Rac_15
          - Tac_5
          - Tac_15
          - Auc_3
          - Auc_5
          - Auc_10
          - Auc_30
          - loss_depth
          - loss_pts_l1
          - depth_l1_unweighted
          - loss_pts_l1_max
          - loss_normal
          - loss_conf_depth
          - depth_conf_median
          - d1
          - d2
          - d3
          - abs_rel
          - sq_rel
          - rmse
          - rmse_log
          - loss_mask
          - mask_pos_ratio
          - loss_point
          - loss_point_l1
          - point_l1_unweighted
          - loss_point_l1_max
          - loss_point_normal
          - loss_consistency
          - loss_consistency_max
          - consistency_valid_count
      val:
        keys_to_log:
          - loss_obj
          - mean_depth_raw
          - loss_align
          - align_cosine
          - loss_camera
          - loss_T
          - loss_R
          - loss_FL
          - loss_PP
          - loss_VP
          - loss_PW
          - pred_T_max
          - Rac_5
          - Rac_15
          - Tac_5
          - Tac_15
          - Auc_3
          - Auc_5
          - Auc_10
          - Auc_30
          - loss_depth
          - loss_pts_l1
          - depth_l1_unweighted
          - loss_pts_l1_max
          - loss_normal
          - loss_conf_depth
          - depth_conf_median
          - d1
          - d2
          - d3
          - abs_rel
          - sq_rel
          - rmse
          - rmse_log
          - loss_mask
          - mask_pos_ratio
          - loss_point
          - loss_point_l1
          - point_l1_unweighted
          - loss_point_l1_max
          - loss_point_normal
          - loss_consistency
          - loss_consistency_max
          - consistency_valid_count
