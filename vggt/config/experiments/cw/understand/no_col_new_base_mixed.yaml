# @package _global_
#

defaults:
  - /experiments/cw/understand/no_col_new_base
  - _self_


submitit:
  name: "no_col_new_base_mixed"


trainer:
  model:
    pos_embed_rope_rescale_coords: 2
    AGGREGATOR:
      match_patch_embed_rope_behavior: True
      rope_rescale_coords: 2
      global_attn_mode: "registers"
    CAMERA_HEAD:
      extra_attention_use_all_special_tokens: False
    DEPTH_HEAD:
      disable_conf: True
    POINT_HEAD:
      disable_conf: True
  loss:
    depth:
      use_conf_loss: False
    preg:
      use_conf_loss: False
