# @package _global_

defaults:
  - /experiments/cw/w003_t3

dyna_ratio: 1.0

submitit:
  name: "wlinear"
  account: "fair_amaia_cw_explore"
  qos: "explore"

launcher:
  num_nodes: 8

trainer:
  distributed:
    find_unused_parameters: True

  model:
    _target_: vggt.mixturegaussian.models.mixture_vggt.MixtureVGGT

    DEPTH_HEAD:
      _target_: vggt.mixturegaussian.heads.mixture_linear_head.MixtureLinearHead
      dim_in: 2048
      output_dim: 1
      activation: "exp"
      patch_size: ${patch_size}
      proj_type: "mlp_self"
      mlp_ratio: 0.5
      disable_last_layer_amp: True
      num_hypotheses: 4
      predict_per_component_variance: False
      share_variance_across_hypotheses: True
      summary_type: "argmax"
      predict_mask: False
      extra_attention_depth: 2
      extra_attention_dim: 1024
      extra_attention_post_norm: True
      extra_attention_use_qk_norm: False
      use_checkpoint: False

    POINT_HEAD:
      _target_: vggt.mixturegaussian.heads.mixture_linear_head.MixtureLinearHead
      dim_in: 2048
      output_dim: 3
      activation: "inv_log"
      patch_size: ${patch_size}
      proj_type: "mlp_self"
      mlp_ratio: 0.5
      disable_last_layer_amp: True
      num_hypotheses: 4
      predict_per_component_variance: False
      summary_type: "expectation"
      predict_mask: False
      extra_attention_depth: 2
      extra_attention_dim: 1024
      extra_attention_post_norm: True
      extra_attention_use_qk_norm: False
      use_checkpoint: False

  checkpoint:
    model_weight_initializer:
      _partial_: True
      _target_: omnivision.model.checkpoint_utils.load_state_dict_into_model
      strict: False
      state_dict:
        _target_: omnivision.model.checkpoint_utils.load_multiple_checkpoints_and_apply_kernels
        checkpoints:
          - checkpoint_path: /checkpoint/amaia/scale/jianyuan/vggt/config/experiments/cw/w003_t3.yaml/0/checkpoints/checkpoint.pt
            ckpt_state_dict_keys:
              - model
            checkpoint_kernels:
              - _target_: omnivision.model.checkpoint_utils.CkptExcludeKernel
                key_pattern:
                  - "*depth_head*"
                  - "*point_head*"

  loss:
    _target_: vggt.mixturegaussian.losses.mixture_multitask_loss.MixtureMultitaskLoss
    normalize_predictions: False
    normalization_type: "global"
    normalize_gt: null
    mean_type: "arithmetic"
    align_pred_to_gt: False
    align_resolution: 8192
    camera:
      weight: 4.0
      weight_pairwise: 0.5
      pairwise_rotation_loss_type: "chordal"
      pairwise_translation_loss_type: "l1_robust_direction"
      pairwise_weight_rotation: 1.0
      pairwise_weight_translation: 1.0
      loss_type: "l1_consistent"
      weight_trans: 1.0
      weight_rot: 1.0
      weight_focal: 0.5
      normalize_trans_by_gt_scale: True
      pose_encoding_type: "absT_quaR_FoV"
    depth:
      weight: 2.0
      mixture_loss_space: "depth"
      entropy_reg_weight: 0.0
      weight_normal: 0.0
      min_valid_pts: 100
      abs_l1_loss_ratio: 1.0
      rel_l1_loss_ratio: 0
      add_separate_reg_loss: False
      separate_reg_loss_weight: 1.0
      apply_aux_loss_to_synthetic_only: True
      valid_range: -1
      gradient_loss_config: null
    point: null
    preg:
      weight: 1.0
      weight_normal: 0.0
      min_valid_pts: 100
      abs_l1_loss_ratio: 1.0
      rel_l1_loss_ratio: 0
      add_separate_reg_loss: False
      separate_reg_loss_weight: 1.0
      apply_aux_loss_to_synthetic_only: True
      valid_range: -1
      normalize_by_scale: False
      gradient_loss_config: null
