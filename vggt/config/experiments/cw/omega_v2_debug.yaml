# @package _global_
#


defaults:
  - /experiments/base/base_train
  - /experiments/models_v2/vggt_1b@trainer.model
  # - /experiments/cw/dataset_mix_v6
  # - /experiments/base/base_fsdp
  - /experiments/cw/datasets/overfit@trainer.data.train.dataset.dataset_configs.overfit
  - /experiments/cw/datasets/overfit@trainer.data.val.dataset.dataset_configs.overfit


#################
# Global Variables
#################
use_spawn: True
debug: False
img_size: 512
patch_size: 16
num_workers: 8
# num_workers: 4
load_track: True
load_similarity: False
# synt_ratio: 0.5
synt_ratio: 0.3
g_ratio: 0.5
track_num: 512
shuffle: True
seed_value: 292212

base_lr: 1e-4
mid_lr: 5e-5
min_lr: 1e-10
patch_base_lr: 1e-5
patch_mid_lr: 2.5e-6
patch_min_lr: 1e-11
# dyna_ratio: 4.0
# dyna_ratio: 3.0
dyna_ratio: 0.5
aggregator_register_num: 8
use_flash_attn: True


#################
# Submitit Configuration
#################
submitit:
  name: "v2"
  timeout_min: 8000
  cpus_per_task: 12
  account: "fair_amaia_cw_scale"
  qos: "scale"
  mem_gb: 0
  use_cluster: True
  partition: learn


#################
# Launcher Configuration
#################
launcher:
  gpus_per_node: 8
  num_nodes: 1


#################
# Trainer Configuration
#################
trainer:
  model:
    # norm_denominator: 50

    force_rope_normalize_coords_max: True
    patch_embed_out_indices: [4]

    AGGREGATOR:
      use_flash_attn: ${use_flash_attn}

    CAMERA_HEAD:
      _target_: vggt.models.heads.camera_head_linear.CameraHeadLinear
      dim_in: 2048
      pose_encoding_type: "absT_quaR_FoV"
      mlp_ratio: [0.5]
      patch_size: ${patch_size}
      extra_attention_depth: 4
      use_checkpoint: False
      # use_flash_attn: ${use_flash_attn} # NOTE Flash ATT V3 does not support FP32
      disable_last_layer_amp: True

    DEPTH_HEAD:
      _target_: vggt.models.heads.linear_variants.vgglinearhead_v2.VGGLinearHeadV2
      dim_in: 2048
      output_dim: 2
      activation: "exp"
      conf_activation: "softplus_0.5_10"
      patch_size: ${patch_size}
      proj_type: "linear"
      mlp_ratio: 0.5
      predict_mask: True
      mask_activation: "none"
      disable_last_layer_amp: True
      # fusion_mode: "gated_progressive"
      fusion_mode: "dpt"
      intermediate_layer_idx: [4, 13, 23]
      use_patch_embed_intermediate: True
      patch_embed_dim: 1024
      patch_embed_out_channels: 256
      multiscale_out_channels: [256, 512, 512]
      dpt_use_interpolate_conv2d_upsample: True
      dpt_align_corners: False

    POINT_HEAD:
      _target_: vggt.models.heads.linear_variants.vgglinearhead_v2.VGGLinearHeadV2
      dim_in: 2048
      output_dim: 4
      activation: "inv_log"
      conf_activation: "softplus_0.5_10"
      patch_size: ${patch_size}
      proj_type: "linear"
      mlp_ratio: 0.5
      predict_mask: False
      mask_activation: "none"
      disable_last_layer_amp: True
      # fusion_mode: "gated_progressive"
      fusion_mode: "dpt"
      intermediate_layer_idx: [4, 13, 23]
      use_patch_embed_intermediate: True
      patch_embed_dim: 1024
      patch_embed_out_channels: 256
      multiscale_out_channels: [256, 512, 512]
      dpt_use_interpolate_conv2d_upsample: True
      dpt_align_corners: False

    RAY_HEAD: null
    MATCH_HEAD: null

  cuda:
    allow_tf32: False
    cudnn_deterministic: False
    cudnn_benchmark: False

  checkpoint:
    model_weight_initializer:
      _partial_: True
      _target_: omnivision.model.checkpoint_utils.load_state_dict_into_model
      strict: False
      state_dict:
        _target_: omnivision.model.checkpoint_utils.load_multiple_checkpoints_and_apply_kernels
        checkpoints:
          - checkpoint_path: /checkpoint/amaia/explore/jianyuan/vggt/config/experiments/cw/omega_v2.yaml/0/checkpoints/checkpoint.pt # /checkpoint/amaia/explore/jianyuan/vggt/config/experiments/cw/omega_depth_point_t2.yaml/0/checkpoints/checkpoint_20.pt
            ckpt_state_dict_keys:
              - model

  # resume_ckpt_path: /checkpoint/amaia/explore/jianyuan/vggt/config/experiments/cw/omega_cam_t3.yaml/0/checkpoints/checkpoint.pt

  accum_steps: 1
  visual_viser: False
  val_epoch_freq: 20
  seed_value: ${seed_value}

  max_epochs: 60
  limit_train_batches: 1000
  limit_val_batches: 100

  optim:
    filter_bias_and_bn: True

    # frozen_module_names:
    #   - "*patch_embed*"

    optimizer:
      _target_: torch.optim.AdamW
      lr: ${base_lr}
      weight_decay: 0.05
      betas: [0.9, 0.95]

    amp:
      enabled: True

    gradient_clip:
      _target_: vggt.utils.gradient_clip.GradientClipper
      configs:
        - module_name: ["aggregator", "patch_embed"]
          max_norm: 1.0
          norm_type: 2
        - module_name: ["depth_head"]
          max_norm: 1.0
          norm_type: 2
        - module_name: ["point_head"]
          max_norm: 1.0
          norm_type: 2
        - module_name: ["camera_head"]
          max_norm: 1.0
          norm_type: 2

    options:
      lr:
        # Default LR schedule for all non-patch-embed parameters.
        # 0-5%: linear warmup, 5-100%: cosine decay.
        - scheduler:
            _target_: fvcore.common.param_scheduler.CompositeParamScheduler
            schedulers:
              - _target_: fvcore.common.param_scheduler.LinearParamScheduler
                start_value: ${min_lr}
                end_value: ${base_lr}
              - _target_: fvcore.common.param_scheduler.CosineParamScheduler
                start_value: ${base_lr}
                end_value: ${min_lr}
            lengths: [0.05, 0.95]
            interval_scaling: ['rescaled', 'rescaled']
        # Patch embed uses 0.1x of the default LR schedule.
        # 0-5%: linear warmup, 5-100%: cosine decay.
        - scheduler:
            _target_: fvcore.common.param_scheduler.CompositeParamScheduler
            schedulers:
              - _target_: fvcore.common.param_scheduler.LinearParamScheduler
                start_value: ${patch_min_lr}
                end_value: ${patch_base_lr}
              - _target_: fvcore.common.param_scheduler.CosineParamScheduler
                start_value: ${patch_base_lr}
                end_value: ${patch_min_lr}
            lengths: [0.05, 0.95]
            interval_scaling: ['rescaled', 'rescaled']
          param_names:
            - "*patch_embed*"
      weight_decay:
        - scheduler:
            _target_: fvcore.common.param_scheduler.ConstantParamScheduler
            value: 0.05


#################
# Loss Configuration
#################
  loss:
    _target_: vggt.losses.loss.MultitaskLoss
    ####################################################################################################
    normalize_predictions: True
    normalization_type: "global"
    normalize_gt: "global"
    mean_type: "arithmetic"
    align_pred_to_gt: False 
    #################################################################################################### 
    verbose: False
    intrinsics_warmup_ratio: 0.5
    rel_to_first_cam: False # Pi3 Does not use rel_to_first_cam to the predictions
    align_resolution: 8192
    camera:
      weight: 10.0
      ########################## Pairwise Pose Loss ##########################
      weight_pairwise: 0.5
      pairwise_rotation_loss_type: "chordal"
      pairwise_translation_loss_type: "l1_robust_direction"
      pairwise_weight_rotation: 1.0
      pairwise_weight_translation: 1.0
      ##########################
      loss_type: "l1" # "l1_consistent"
      weight_trans: 2.0
      weight_rot: 1.0
      weight_focal: 1.0
      normalize_trans_by_gt_scale: True
      pose_encoding_type: "absT_quaR_FoV"
    depth:
      weight: 10.0
      weight_normal: 0.25
      abs_l1_loss_ratio: 2.0
      rel_l1_loss_ratio: 0.2
      use_conf_loss: True
      conf_alpha: 0.1
      # use_gt_var_weighting: True
      # valid_range: 0.99
      gradient_loss_config:
        - type: "normal"
          scales: 3
          weight: 0.2
        - type: "grad"
          scales: 5
    point: 
      weight: 5.0
      weight_normal: 0.25
      abs_l1_loss_ratio: 2.0
      rel_l1_loss_ratio: 0.2
      use_conf_loss: True
      # valid_range: 0.99
      detach_conf_for_loss: True
      gradient_loss_config:
        - type: "normal"
          scales: 3
          weight: 0.2
    preg: 
      weight: 10.0
      weight_normal: 0.5
      abs_l1_loss_ratio: 2.0
      rel_l1_loss_ratio: 0.2
      use_conf_loss: True
      conf_alpha: 0.1
      # use_gt_var_weighting: True
      # valid_range: 0.99
      gradient_loss_config:
        - type: "normal"
          scales: 3
          weight: 0.2
        # - type: "edge_aware"
        #   scales: 1
        #   weight: 0.25
        # - type: "grad"
        #   scales: 5
    track:
      weight: 10.0
      # weight: 1.0  
      # valid_range: 0.99
    mask:
      weight: 5.0
      loss_type: "bce"
    ray: null
    match: null

#################
# Data Loading
#################
  data:
    train:
      _target_: vggt.data.dynamic_dataloader.DynamicTorchDataset
      num_workers: ${num_workers}
      use_spawn: ${use_spawn}
      dyna_ratio: ${dyna_ratio}
      sync_image_num: False
      sync_node: False
      persistent_workers: False
      reuse_dataloader: False
      seed: ${seed_value}
      shuffle: ${shuffle}
      pin_memory: True
      common_config:
        sample_dict: "s1"
        ratio_dict: "s1"
        img_size: ${img_size}
        patch_size: ${patch_size}
        debug: ${debug}
        repeat_batch: False
        img_nums: [2, 12]
        aug_principal_point: True
        random_rotation_ratio: 0.02 # -1 # 0.01 # TO BE APPLIED IN LATER PHASES
        random_patch_mask_size: 128
        random_patch_mask_ratio: 0.05
        load_track: ${load_track}
        track_num: ${track_num}
        load_similarity: ${load_similarity}
        synt_ratio: ${synt_ratio}
        g_ratio: ${g_ratio}
        load_ray_map: False
        thread_io_worker_num: -1
        # thread_io_worker_num: 10
        # thread_io_worker_num: 4
        # rescale_prob: 0.9
        augs:
          enable_image_aug: True # True
          aspects: [0.5, 2.0]
          cojitter_ratio: 0.5
          jpeg_compression: 0.02
          low_res_blur: 0.02
          color_jitter:
            brightness: 0.65
            contrast: 0.65
            saturation: 0.5
            hue: 0.1
            p: 0.9
        compute_invalid_area: True
        adaptive_step_range: True
        adaptive_step_range_base: 8
        # joint_step_ratio: 0.6
        joint_step_ratio: 1.0
        skip_extreme_rescale: False # DO NOT use skip_extreme_rescale any more
        randomize_token_number: False
        # avoid_upsample: True # Instead, we use avoid_upsample to prevent upsampling
      dataset:
        _target_: vggt.data.composed_dataset.ComposedDataset
    val:
      _target_: vggt.data.dynamic_dataloader.DynamicTorchDataset
      num_workers: ${num_workers}
      sync_image_num: False
      use_spawn: ${use_spawn}
      shuffle: ${shuffle}
      pin_memory: True
      seed: ${seed_value}
      common_config:
        sample_dict: "s1"
        ratio_dict: "s1"
        img_size: ${img_size}
        patch_size: ${patch_size}
        debug: ${debug}
        load_track: ${load_track}
        track_num: ${track_num}
        load_similarity: ${load_similarity}
        synt_ratio: ${synt_ratio}
        g_ratio: ${g_ratio}
        load_ray_map: False
        thread_io_worker_num: -1
        compute_invalid_area: True
        adaptive_step_range: True
        adaptive_step_range_base: 8
        # joint_step_ratio: 0.6
        joint_step_ratio: 1.0
        skip_extreme_rescale: False # DO NOT use skip_extreme_rescale any more
        # avoid_upsample: True # Instead, we use avoid_upsample to prevent upsampling
      dataset:
        _target_: vggt.data.composed_dataset.ComposedDataset


  logging:
    scalar_keys_to_log:
      train:
        keys_to_log:
          - loss_obj
          - mean_depth_raw
          # Camera
          - loss_camera
          - loss_T
          - loss_R
          - loss_FL
          - loss_PP
          - loss_VP
          - loss_PW
          - pred_T_max
          # Camera Metrics
          - Rac_5
          - Rac_15
          - Tac_5
          - Tac_15
          - Auc_3
          - Auc_5
          - Auc_10
          - Auc_30
          # Depth
          - loss_depth
          - loss_pts_l1
          - loss_pts_l1_max
          - loss_normal
          - loss_conf_depth
          - depth_conf_median
          # Depth Metrics
          - d1
          - d2
          - d3
          - abs_rel
          - sq_rel
          - rmse
          - rmse_log
          # Mask
          - loss_mask
          - mask_pos_ratio
          # Point
          - loss_point
          - loss_point_l1
          - loss_point_l1_max
          - loss_point_normal
          # Point Reg
          - loss_preg
          - loss_preg_l1
          - loss_preg_l1_max
          - loss_preg_normal
          # Consistency
          - loss_consistency
          - loss_consistency_max
          - consistency_valid_count
      val:
        keys_to_log:
          - loss_obj
          - mean_depth_raw
          # Camera
          - loss_camera
          - loss_T
          - loss_R
          - loss_FL
          - loss_PP
          - loss_VP
          - loss_PW
          - pred_T_max
          # Camera Metrics
          - Rac_5
          - Rac_15
          - Tac_5
          - Tac_15
          - Auc_3
          - Auc_5
          - Auc_10
          - Auc_30
          # Depth
          - loss_depth
          - loss_pts_l1
          - loss_pts_l1_max
          - loss_normal
          - loss_conf_depth
          - depth_conf_median
          # Depth Metrics
          - d1
          - d2
          - d3
          - abs_rel
          - sq_rel
          - rmse
          - rmse_log
          # Mask
          - loss_mask
          - mask_pos_ratio
          # Point
          - loss_point
          - loss_point_l1
          - loss_point_l1_max
          - loss_point_normal
          # Point Reg
          - loss_preg
          - loss_preg_l1
          - loss_preg_l1_max
          - loss_preg_normal
          # Consistency
          - loss_consistency
          - loss_consistency_max
          - consistency_valid_count

