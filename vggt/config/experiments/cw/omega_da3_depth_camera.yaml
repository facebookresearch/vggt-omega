# @package _global_
#

defaults:
  - /experiments/base/base_train
  - /experiments/models_v2/da3_giant@trainer.model
  # - /experiments/cw/dataset_mix_v6
  # - /experiments/cw/datasets/overfit@trainer.data.train.dataset.dataset_configs.overfit
  # - /experiments/cw/datasets/overfit@trainer.data.val.dataset.dataset_configs.overfit
  - /experiments/cw/datasets/mvs@trainer.data.train.dataset.dataset_configs.mvs
  - /experiments/cw/datasets/mvs@trainer.data.val.dataset.dataset_configs.mvs


use_spawn: True
debug: False
img_size: 518
patch_size: 14
num_workers: 8
load_track: False
load_similarity: False
synt_ratio: 0.3
g_ratio: 0.5
track_num: 512
shuffle: True
seed_value: 292212

base_lr: 1e-9 # only finetune
min_lr: 1e-10
dyna_ratio: 0.5

submitit:
  name: "omega_da3_depth_camera"
  timeout_min: 8000
  cpus_per_task: 12
  account: "fair_amaia_cw_scale"
  qos: "scale"
  mem_gb: 0
  use_cluster: True
  partition: learn

launcher:
  gpus_per_node: 8
  num_nodes: 1

trainer:
  model:
    pose_encoding_type: "absT_quaR_FoV"
    return_pose_encoding: True
    use_input_camera_token: False
    # DA3 benchmark/eval uses "first" reference strategy for pose evaluation.
    # Keep this consistent when validating converted checkpoints.
    ref_view_strategy: "first"

  cuda:
    allow_tf32: False
    cudnn_deterministic: False
    cudnn_benchmark: False

  checkpoint:
    save_freq: 10
    model_weight_initializer:
      _partial_: True
      _target_: omnivision.model.checkpoint_utils.load_state_dict_into_model
      strict: False
      state_dict:
        _target_: omnivision.model.checkpoint_utils.load_multiple_checkpoints_and_apply_kernels
        checkpoints:
          - checkpoint_path: /home/jianyuan/ckpts/DA3-GIANT-1.1/model_omega_da3_giant_no_gs.pt
            ckpt_state_dict_keys:
              - model

  accum_steps: 1
  visual_viser: False
  val_epoch_freq: 20
  seed_value: ${seed_value}
  max_epochs: 50
  limit_train_batches: 1000
  limit_val_batches: 100

  distributed:
    backend: nccl
    find_unused_parameters: False

  optim:
    filter_bias_and_bn: True
    optimizer:
      _target_: torch.optim.AdamW
      lr: ${base_lr}
      weight_decay: 0.05
      betas: [0.9, 0.95]

    amp:
      enabled: True

    gradient_clip:
      _target_: vggt.utils.gradient_clip.GradientClipper
      configs:
        - module_name: ["model"]
          max_norm: 1.0
          norm_type: 2

    options:
      lr:
        - scheduler:
            _target_: fvcore.common.param_scheduler.CompositeParamScheduler
            schedulers:
              - _target_: fvcore.common.param_scheduler.LinearParamScheduler
                start_value: ${min_lr}
                end_value: ${base_lr}
              - _target_: fvcore.common.param_scheduler.ConstantParamScheduler
                value: ${base_lr}
            lengths: [0.05, 0.95]
            interval_scaling: ["rescaled", "rescaled"]
      weight_decay:
        - scheduler:
            _target_: fvcore.common.param_scheduler.ConstantParamScheduler
            value: 0.05

  loss:
    _target_: vggt.losses.loss.MultitaskLoss
    normalize_predictions: False
    normalization_type: "global"
    normalize_gt: null
    verbose: False
    intrinsics_warmup_ratio: 0.5
    rel_to_first_cam: False
    align_pred_to_gt: False
    align_resolution: 8192
    mean_type: "geometric"
    camera:
      weight: 10.0
      weight_pairwise: 0.0
      loss_type: "l1"
      weight_trans: 5.0
      weight_rot: 1.0
      weight_focal: 1.0
      normalize_trans_by_gt_scale: True
      pose_encoding_type: "absT_quaR_FoV"
    depth:
      weight: 10.0
      weight_normal: 0.5
      abs_l1_loss_ratio: 2.0
      rel_l1_loss_ratio: 0.2
      use_conf_loss: True
      conf_alpha: 0.1
      gradient_loss_config:
        - type: "normal"
          scales: 3
          weight: 0.2
        - type: "grad"
          scales: 5
    point: null
    preg: null
    track: null
    mask:
      weight: 0.5
      loss_type: "bce"
    ray: null
    match: null

  data:
    train:
      _target_: vggt.data.dynamic_dataloader.DynamicTorchDataset
      num_workers: ${num_workers}
      use_spawn: ${use_spawn}
      dyna_ratio: ${dyna_ratio}
      sync_image_num: False
      sync_node: False
      persistent_workers: False
      reuse_dataloader: False
      seed: ${seed_value}
      shuffle: ${shuffle}
      pin_memory: True
      common_config:
        sample_dict: "s1"
        ratio_dict: "s1"
        img_size: ${img_size}
        patch_size: ${patch_size}
        debug: ${debug}
        repeat_batch: False
        img_nums: [2, 12]
        aug_principal_point: True
        random_rotation_ratio: -1
        random_patch_mask_size: 128
        random_patch_mask_ratio: -1
        load_track: ${load_track}
        track_num: ${track_num}
        load_similarity: ${load_similarity}
        synt_ratio: ${synt_ratio}
        g_ratio: ${g_ratio}
        load_ray_map: False
        thread_io_worker_num: -1
        augs:
          enable_image_aug: False
          aspects: [1.0, 1.0]
          cojitter_ratio: 0.5
          jpeg_compression: -1
          low_res_blur: -1
          color_jitter:
            brightness: 0.5
            contrast: 0.5
            saturation: 0.5
            hue: 0.1
            p: 0.9
        compute_invalid_area: True
        adaptive_step_range: True
        adaptive_step_range_base: 8
        joint_step_ratio: 1.0
        skip_extreme_rescale: False
      dataset:
        _target_: vggt.data.composed_dataset.ComposedDataset

    val:
      _target_: vggt.data.dynamic_dataloader.DynamicTorchDataset
      num_workers: ${num_workers}
      sync_image_num: False
      use_spawn: ${use_spawn}
      shuffle: ${shuffle}
      pin_memory: True
      seed: ${seed_value}
      common_config:
        sample_dict: "s1"
        ratio_dict: "s1"
        img_size: ${img_size}
        patch_size: ${patch_size}
        debug: ${debug}
        load_track: ${load_track}
        track_num: ${track_num}
        load_similarity: ${load_similarity}
        synt_ratio: ${synt_ratio}
        g_ratio: ${g_ratio}
        load_ray_map: False
        thread_io_worker_num: -1
        compute_invalid_area: True
        adaptive_step_range: True
        adaptive_step_range_base: 8
        joint_step_ratio: 1.0
        skip_extreme_rescale: False
      dataset:
        _target_: vggt.data.composed_dataset.ComposedDataset

  logging:
    scalar_keys_to_log:
      train:
        keys_to_log:
          - loss_obj
          - mean_depth_raw
          - loss_camera
          - loss_T
          - loss_R
          - loss_FL
          - pred_T_max
          - Rac_5
          - Rac_15
          - Tac_5
          - Tac_15
          - Auc_3
          - Auc_5
          - Auc_10
          - Auc_30
          - loss_depth
          - loss_pts_l1
          - loss_pts_l1_max
          - loss_normal
          - loss_conf_depth
          - depth_conf_median
          - d1
          - d2
          - d3
          - abs_rel
          - sq_rel
          - rmse
          - rmse_log
          - loss_mask
          - mask_pos_ratio
      val:
        keys_to_log:
          - loss_obj
          - mean_depth_raw
          - loss_camera
          - loss_T
          - loss_R
          - loss_FL
          - pred_T_max
          - Rac_5
          - Rac_15
          - Tac_5
          - Tac_15
          - Auc_3
          - Auc_5
          - Auc_10
          - Auc_30
          - loss_depth
          - loss_pts_l1
          - loss_pts_l1_max
          - loss_normal
          - loss_conf_depth
          - depth_conf_median
          - d1
          - d2
          - d3
          - abs_rel
          - sq_rel
          - rmse
          - rmse_log
          - loss_mask
          - mask_pos_ratio
