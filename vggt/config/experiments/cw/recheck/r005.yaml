# @package _global_
#
# Use the broader w003-style geometry augmentation bundle on top of r001,
# while keeping resolution, dataset mix, and losses fixed.

defaults:
  - /experiments/cw/recheck/r001

submitit:
  name: "r005"

trainer:
  data:
    train:
      common_config:
        same_preprocess_ratio: 0.02
        enable_edge_rtol_thres: False
        augs:
          aspects: [0.5, 2.0]
          use_discrete_aspect_ratios: False
