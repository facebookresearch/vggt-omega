# @package _global_
#
# C series: c1, c2.
# Add the whole series on top of r001 and scale it to about 30% of train sampling.

defaults:
  - /experiments/cw/recheck/r001
  - /experiments/cw/datasets_synt/c1@trainer.data.train.dataset.dataset_configs.c1
  - /experiments/cw/datasets_synt/c2@trainer.data.train.dataset.dataset_configs.c2

submitit:
  name: "r022_c_series"

trainer:
  data:
    train:
      dataset:
        dataset_configs:
          c1:
            len_dataset_scale: 23.56
          c2:
            len_dataset_scale: 23.56



