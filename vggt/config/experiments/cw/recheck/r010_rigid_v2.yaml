# @package _global_
#
# Add only rigid_v2 on top of r001 and scale it to about 30% of train sampling.

defaults:
  - /experiments/cw/recheck/r001
  - /experiments/cw/datasets_real/rigid_v2@trainer.data.train.dataset.dataset_configs.rigid_v2

submitit:
  name: "r010_rigid_v2"

trainer:
  data:
    train:
      dataset:
        dataset_configs:
          rigid_v2:
            len_dataset_scale: 1.181
