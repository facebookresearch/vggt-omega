# @package _global_
#
# Series C: interiornet, staticthings3d, taskonomy, wai_gta_sfm, tex_v2.
# Add the whole series on top of r001 and scale it to about 30% of train sampling.

defaults:
  - /experiments/cw/recheck/r001
  - /experiments/cw/datasets_synt/interiornet@trainer.data.train.dataset.dataset_configs.interiornet
  - /experiments/cw/datasets_synt/staticthings3d@trainer.data.train.dataset.dataset_configs.staticthings3d
  - /experiments/cw/datasets_synt/taskonomy@trainer.data.train.dataset.dataset_configs.taskonomy
  - /experiments/cw/datasets_synt/wai_gta_sfm@trainer.data.train.dataset.dataset_configs.wai_gta_sfm
  - /experiments/cw/datasets_synt/tex_v2@trainer.data.train.dataset.dataset_configs.tex_v2

submitit:
  name: "r017_series_c"

trainer:
  data:
    train:
      dataset:
        dataset_configs:
          interiornet:
            len_dataset_scale: 0.86154
          staticthings3d:
            len_dataset_scale: 0.43077
          taskonomy:
            len_dataset_scale: 4.3077
          wai_gta_sfm:
            len_dataset_scale: 6.46155
          tex_v2:
            len_dataset_scale: 0.5384625
