# @package _global_
#
# Add all saibo-named datasets on top of r001 and scale the series
# to about 30% of train sampling while preserving internal ratios.

defaults:
  - /experiments/cw/recheck/r001
  - /experiments/cw/datasets_synt/collected_saibo@trainer.data.train.dataset.dataset_configs.collected_saibo
  - /experiments/cw/datasets_synt/saibo28@trainer.data.train.dataset.dataset_configs.saibo28
  - /experiments/cw/datasets_synt/r2_saibo@trainer.data.train.dataset.dataset_configs.r2_saibo
  - /experiments/cw/datasets_synt/r2_saibo_25@trainer.data.train.dataset.dataset_configs.r2_saibo_25

submitit:
  name: "r008_saibo"

trainer:
  data:
    train:
      dataset:
        dataset_configs:
          collected_saibo:
            len_dataset_scale: 6.09
          saibo28:
            len_dataset_scale: 6.09
          r2_saibo:
            len_dataset_scale: 4.06
          r2_saibo_25:
            len_dataset_scale: 4.06
