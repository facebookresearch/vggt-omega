# @package _global_
#
# Enable confidence heads/losses, turn on point loss, disable preg,
# and use 512 resolution on top of r001.
# Reuse w003_t4 depth/point head initialization for the confidence setup.

defaults:
  - /experiments/cw/recheck/r001

submitit:
  name: "r023_conf_point_512_no_preg"

img_size: 512
dyna_ratio: 0.5

trainer:
  model:
    DEPTH_HEAD:
      disable_conf: False

    POINT_HEAD: null

  checkpoint:
    model_weight_initializer:
      state_dict:
        checkpoints:
          - checkpoint_path: /checkpoint/amaia/scale/jianyuan/vggt/config/experiments/cw_apr/restart_r256_include_patience_match_t12.yaml/0/checkpoints/checkpoint.pt
            ckpt_state_dict_keys:
              - model
            checkpoint_kernels:
              - _target_: omnivision.model.checkpoint_utils.CkptExcludeKernel
                key_pattern:
                  - "*depth_head*"
          - checkpoint_path: /checkpoint/amaia/scale/jianyuan/vggt/config/experiments/cw/w003_t4.yaml/0/checkpoints/checkpoint.pt
            ckpt_state_dict_keys:
              - model
            checkpoint_kernels:
              - _target_: omnivision.model.checkpoint_utils.CkptIncludeKernel
                key_pattern:
                  - "*depth_head*"

  loss:
    depth:
      use_conf_loss: True
      separate_reg_loss_weight: 2.0
      valid_range: 0.99
      gradient_loss_config:
        - type: "normal_pi"
          scales: 2
          min_valid_samples: 10
          weight: 0.1
        - type: "grad"
          scales: 4
          weight: 1.0

    point:
      weight: 1.0
      weight_normal: 1.0
      min_valid_pts: 100
      abs_l1_loss_ratio: 1.0
      rel_l1_loss_ratio: 0
      use_conf_loss: True
      conf_alpha: 0.2
      add_separate_reg_loss: True
      separate_reg_loss_weight: 2.0
      apply_aux_loss_to_synthetic_only: True
      valid_range: 0.99
      detach_conf_for_loss: True
      gradient_loss_config: null

    preg: null
