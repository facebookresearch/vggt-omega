# @package _global_
#
# Add the ue series on top of r001 and scale the series
# to about 30% of train sampling while preserving internal ratios.

defaults:
  - /experiments/cw/recheck/r001
  - /experiments/cw/datasets_synt/ue@trainer.data.train.dataset.dataset_configs.ue
  - /experiments/cw/datasets_synt/ue1@trainer.data.train.dataset.dataset_configs.ue1
  - /experiments/cw/datasets_synt/uedec@trainer.data.train.dataset.dataset_configs.uedec

submitit:
  name: "r012_ue"

trainer:
  data:
    train:
      dataset:
        dataset_configs:
          ue:
            len_dataset_scale: 3.1105
          ue1:
            len_dataset_scale: 3.1105
          uedec:
            len_dataset_scale: 6.221
