# @package _global_
#
# Add the hor series on top of r001 and scale the series
# to about 30% of train sampling while preserving internal ratios.

defaults:
  - /experiments/cw/recheck/r001
  - /experiments/cw/datasets_synt/hor@trainer.data.train.dataset.dataset_configs.hor
  - /experiments/cw/datasets_synt/hor02@trainer.data.train.dataset.dataset_configs.hor02
  - /experiments/cw/datasets_synt/hor28@trainer.data.train.dataset.dataset_configs.hor28

submitit:
  name: "r013_hor"

trainer:
  data:
    train:
      dataset:
        dataset_configs:
          hor:
            len_dataset_scale: 11.5416
          hor02:
            len_dataset_scale: 11.5416
          hor28:
            len_dataset_scale: 11.5416
