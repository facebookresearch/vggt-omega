# @package _global_
#
# Series E: gen2pilot, wai_dynamicreplica, r2_b1.
# Add the whole series on top of r001 and scale it to about 30% of train sampling.

defaults:
  - /experiments/cw/recheck/r001
  - /experiments/cw/datasets_real/gen2pilot@trainer.data.train.dataset.dataset_configs.gen2pilot
  - /experiments/cw/datasets_synt/wai_dynamicreplica@trainer.data.train.dataset.dataset_configs.wai_dynamicreplica
  - /experiments/cw/datasets_synt/r2_b1@trainer.data.train.dataset.dataset_configs.r2_b1

submitit:
  name: "r019_series_e"

trainer:
  data:
    train:
      dataset:
        dataset_configs:
          gen2pilot:
            len_dataset_scale: 7.4
          wai_dynamicreplica:
            len_dataset_scale: 37.0
          r2_b1:
            len_dataset_scale: 9.25
