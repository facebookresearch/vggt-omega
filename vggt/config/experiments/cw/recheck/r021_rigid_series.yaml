# @package _global_
#
# Rigid series: rigid_v1_top50, rigid_v2_uncertain, rigid_v1_todo.
# Add the whole series on top of r001 and scale it to about 30% of train sampling.

defaults:
  - /experiments/cw/recheck/r001
  - /experiments/cw/datasets_real/rigid_v1_top50@trainer.data.train.dataset.dataset_configs.rigid_v1_top50
  - /experiments/cw/datasets_real/rigid_v2_uncertain@trainer.data.train.dataset.dataset_configs.rigid_v2_uncertain
  - /experiments/cw/datasets_real/rigid_v1_todo@trainer.data.train.dataset.dataset_configs.rigid_v1_todo

submitit:
  name: "r021_rigid_series"

trainer:
  data:
    train:
      dataset:
        dataset_configs:
          rigid_v1_top50:
            len_dataset_scale: 0.70895
          rigid_v2_uncertain:
            len_dataset_scale: 0.28358
          rigid_v1_todo:
            len_dataset_scale: 1.4179
