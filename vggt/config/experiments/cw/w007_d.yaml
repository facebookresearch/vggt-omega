# @package _global_

defaults:
  - /experiments/cw/w007_linear
  - /experiments/base/base_fsdp
  # - _self_

submitit:
  name: "w007_d"
  account: "fair_amaia_cw_explore"
  qos: "explore"

# launcher:
#   num_nodes: 16

trainer:
  model:
    DEPTH_HEAD:
      _target_: vggt.models.heads.dpt_head.DPTHead
      dim_in: 2048
      output_dim: 2
      activation: "exp"
      conf_activation: "expp1"
      patch_size: ${patch_size}
      features: 256
      out_channels: [256, 512, 1024, 1024]
      intermediate_layer_idx: [4, 11, 17, 23]
      predict_mask: False
      mask_activation: "none"
      pos_embed: True

  checkpoint:
    model_weight_initializer:
      strict: True
      state_dict:
        checkpoints:
          - checkpoint_path: /checkpoint/amaia/scale/jianyuan/vggt/config/experiments/cw/w003_t4.yaml/0/checkpoints/checkpoint.pt
            ckpt_state_dict_keys:
              - model
            checkpoint_kernels:
              - _target_: omnivision.model.checkpoint_utils.CkptExcludeKernel
                key_pattern:
                  - "*point_head*"
