# @package _group_
#
# Pi3 v3 - Fixed to match Pi3's architecture exactly
# Key fixes from pi3_v2:
# 1. LayerScale init: 0.01 (was 1e-5)
# 2. Head extra attention: no LayerScale, no QK norm (was 1e-5 and True)
# 3. Head depth: 5 (was 6)
# 4. Disable K bias masking in aggregator (was True, Pi3 uses full bias)
# 5. Disable K bias masking in head (was True, Pi3 uses full bias)
# 6. Disable post-attention LayerNorm in head (Pi3 doesn't have it)
# 7. Use Pi3-style initialization (PyTorch defaults, register_token std=1e-6)

_target_: vggt.models.models.vggt.VGGT
enable_head_amp: True
init_aggregator_by_patch_embed: False
patch_embed: "dinov2_vitl14_reg"
img_size: ${img_size}
patch_size: ${patch_size}
embed_dim: 1024

AGGREGATOR:
  _target_: vggt.models.models.aggregator.Aggregator
  num_register_tokens: ${aggregator_register_num}
  patch_size: ${patch_size}
  embed_dim: 1024
  depth: 18
  num_heads: 16
  mlp_ratio: 4.0
  use_qk_norm: True
  global_attn_mode: "all"
  global_attn_partial_ratio: -1
  aa_order: ["frame", "global"]
  use_dino_clsreg: False
  rope_dtype: "fp32"
  disable_rope_global: False
  # FIX 1: LayerScale init should be 0.01 to match Pi3
  init_values: 0.01
  # FIX 4: Disable K bias masking to match Pi3 (Pi3 uses full bias for Q/K/V)
  mask_k_bias: False
  # FIX 7: Use Pi3-style initialization (PyTorch defaults for Linear, register_token std=1e-6)
  init_mode: "pi3"

CAMERA_HEAD:
  _target_: vggt.models.heads.camera_head_linear.CameraHeadLinear
  dim_in: 2048
  pose_encoding_type: "absT_quaR_FoV_c2w"
  mlp_ratio: [0.5]
  patch_size: ${patch_size}
  # FIX 2: Match Pi3's TransformerDecoder architecture
  extra_attention_depth: 5
  extra_attention_dim: 1024
  extra_attention_num_heads: 16
  extra_attention_mlp_ratio: 4.0
  extra_attention_qkv_bias: True
  extra_attention_proj_bias: True
  extra_attention_ffn_bias: True
  # FIX 3: No QK norm and no LayerScale in head blocks (Pi3 style)
  extra_attention_use_qk_norm: False
  extra_attention_init_values: null
  # FIX 5: No K bias masking in head (Pi3 uses full bias)
  extra_attention_mask_k_bias: False
  # FIX 6: No post-attention LayerNorm (Pi3 doesn't have it)
  extra_attention_post_norm: False
  extra_attention_rope_freq: 100
  extra_attention_rope_dtype: "fp32"
  disable_last_layer_amp: True

DEPTH_HEAD:
  _target_: vggt.models.heads.linear_head.LinearHead
  dim_in: 2048
  output_dim: 4
  activation: "xy_exp"
  conf_activation: "softplus_0.5_5"
  patch_size: ${patch_size}
  proj_type: "linear"  # Changed from "mlp_self" to "linear" to match Pi3's structure
  mlp_ratio: 0.5
  disable_conf: True
  predict_mask: False
  mask_activation: "sigmoid"
  separate_conf_head: False
  # FIX 2: Match Pi3's TransformerDecoder architecture
  extra_attention_depth: 5      # Changed from 6 to 5
  extra_attention_dim: 1024
  extra_attention_num_heads: 16
  extra_attention_mlp_ratio: 4.0
  extra_attention_qkv_bias: True
  extra_attention_proj_bias: True
  extra_attention_ffn_bias: True
  # FIX 3: No QK norm and no LayerScale in head blocks (Pi3 style)
  extra_attention_use_qk_norm: False    # Changed from True to False
  extra_attention_init_values: null     # null means no LayerScale (was 1e-5)
  # FIX 5: No K bias masking in head (Pi3 uses full bias)
  extra_attention_mask_k_bias: False
  # FIX 6: No post-attention LayerNorm (Pi3 doesn't have it)
  extra_attention_post_norm: False
  extra_attention_rope_freq: 100
  extra_attention_rope_dtype: "fp32"
  disable_last_layer_amp: True

POINT_HEAD: null
RAY_HEAD: null
MATCH_HEAD: null
