# @package _group_

_target_: vggt.models.models.vggt.VGGT
enable_head_amp: True
init_aggregator_by_patch_embed: True
init_heads_by_patch_embed: True
patch_embed: "dinov3_vitl16"
img_size: ${img_size}
patch_size: ${patch_size}
embed_dim: 1024
AGGREGATOR:
  _target_: vggt.models.models.aggregator.Aggregator
  num_register_tokens: ${aggregator_register_num}
  patch_size: ${patch_size}
  embed_dim: 1024
  depth: 24
  num_heads: 16
  mlp_ratio: 4.0
  use_qk_norm: True # note disabled qk norm here
  global_attn_mode: "specials"
  global_attn_partial_ratio: 0.25
  # aa_order: ["global", "frame"] # note this is changed here
  aa_order: ["frame", "global"]
  use_dino_clsreg: True
  rope_dtype: "fp32"
  disable_rope_global: False
  init_values: 0.01
  mask_k_bias: False
  init_mode: "pi3"
CAMERA_HEAD:
  _target_: vggt.models.heads.camera_head_linear.CameraHeadLinear
  dim_in: 2048
  pose_encoding_type: "absT_quaR_FoV_c2w"
  mlp_ratio: [0.5]
  patch_size: ${patch_size}
  # FIX 2: Match Pi3's TransformerDecoder architecture
  extra_attention_depth: 4
  disable_last_layer_amp: True
  use_checkpoint: False




DEPTH_HEAD:
  _target_: vggt.models.heads.linear_head.LinearHead
  dim_in: 2048
  output_dim: 2
  activation: "exp"
  conf_activation: "softplus_0.5_5"
  patch_size: ${patch_size}
  proj_type: "linear"
  mlp_ratio: 0.5
  disable_conf: True
  predict_mask: True
  mask_activation: "sigmoid"
  separate_conf_head: False
  extra_attention_depth: 4
  disable_last_layer_amp: True
  use_checkpoint: False

POINT_HEAD: 
  _target_: vggt.models.heads.linear_head.LinearHead
  dim_in: 2048
  output_dim: 4
  activation: "inv_log"
  conf_activation: "softplus_0.5_5"
  patch_size: ${patch_size}
  proj_type: "linear"
  mlp_ratio: 0.5
  disable_conf: True
  predict_mask: False
  mask_activation: "sigmoid"
  separate_conf_head: False
  extra_attention_depth: 4
  disable_last_layer_amp: True
  use_checkpoint: False

RAY_HEAD: null
MATCH_HEAD: null



