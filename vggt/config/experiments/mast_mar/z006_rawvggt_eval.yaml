# @package _global_
#


defaults:
  - /experiments/base/base_train
  - /experiments/mast/dataset_mix_v6_eval 
  # - /experiments/base/base_fsdp
  # - /experiments/cw/datasets/overfit@trainer.data.train.dataset.dataset_configs.overfit
  # - /experiments/cw/datasets/overfit@trainer.data.val.dataset.dataset_configs.overfit
  # - /experiments/mast/datasets/dl3dv@trainer.data.train.dataset.dataset_configs.dl3dv
  # - /experiments/mast/da3_datasets/da3_hiroom@trainer.data.val.dataset.dataset_configs.da3_hiroom

#################
# Global Variables
#################
use_spawn: True
debug: False
img_size: 518
patch_size: 14
num_workers: 10
load_track: False
load_similarity: False
synt_ratio: 0.25
track_num: 512
shuffle: True
seed_value: 12196

base_lr: 1e-4
mid_lr: 5e-5
min_lr: 1e-9
patch_base_lr: 5e-6
patch_mid_lr: 2.5e-6
patch_min_lr: 5e-11
dyna_ratio: 0.5
# aggregator_register_num: 8


#################
# Submitit Configuration
#################
submitit:
  name: "z006_n32"
  timeout_min: 8000
  cpus_per_task: 12
  account: "fair_amaia_cw_scale"
  qos: "scale"
  mem_gb: 0
  use_cluster: True
  partition: learn


#################
# Launcher Configuration
#################
launcher:
  gpus_per_node: 8
  num_nodes: 1


#################
# Trainer Configuration
#################
trainer:
  mode: val
  model:
    _target_: vggt.raw_vggt_models.models.vggt.VGGT
    img_size: ${img_size}
    patch_size: ${patch_size}
    embed_dim: 1024
    enable_camera: True
    enable_point: False
    enable_depth: True
    enable_track: False #${load_track}

  cuda:
    allow_tf32: False
    cudnn_deterministic: False
    cudnn_benchmark: False


  checkpoint:
    model_weight_initializer:
      _partial_: True
      _target_: omnivision.model.checkpoint_utils.load_state_dict_into_model
      strict: False
      state_dict:
        _target_: omnivision.model.checkpoint_utils.load_multiple_checkpoints_and_apply_kernels
        checkpoints:
          - checkpoint_path: /mnt/coreai_3d/tree/jianyuan/ckpts/ckpt_ori/vggt_1b_wrapped_ori.pt
            ckpt_state_dict_keys:
            - state_dict


  accum_steps: 1
  visual_viser: False
  val_epoch_freq: 10
  seed_value: ${seed_value}

  max_epochs: 100
  limit_train_batches: 1000
  limit_val_batches: 100

  optim:

    filter_bias_and_bn: True
    optimizer:
      _target_: torch.optim.AdamW
      lr: ${base_lr}
      weight_decay: 0.05
      betas: [0.9, 0.95]

    amp:
      enabled: True

    gradient_clip:
      _target_: vggt.utils.gradient_clip.GradientClipper
      configs:
        - module_name: ["aggregator", "head", "patch_embed"]
          max_norm: 1.0
          norm_type: 2

    options:
      lr:
        # Main learning rate schedule:
        # 0-2%: linear warmup, 2%-20%: cosine decay, 20%-100%: cosine decay
        - scheduler:
            _target_: fvcore.common.param_scheduler.CompositeParamScheduler
            schedulers:
              - _target_: fvcore.common.param_scheduler.LinearParamScheduler
                start_value: ${min_lr}
                end_value: ${base_lr}
              - _target_: fvcore.common.param_scheduler.CosineParamScheduler
                start_value: ${base_lr}
                end_value: ${mid_lr}
              - _target_: fvcore.common.param_scheduler.CosineParamScheduler
                start_value: ${mid_lr}
                end_value: ${min_lr}
            lengths: [0.02, 0.18, 0.80]
            interval_scaling: ['rescaled', 'rescaled', 'rescaled']
        # Patch embed learning rate schedule (0.05x of main)
        - scheduler:
            _target_: fvcore.common.param_scheduler.CompositeParamScheduler
            schedulers:
              - _target_: fvcore.common.param_scheduler.LinearParamScheduler
                start_value: ${patch_min_lr}
                end_value: ${patch_base_lr}
              - _target_: fvcore.common.param_scheduler.CosineParamScheduler
                start_value: ${patch_base_lr}
                end_value: ${patch_mid_lr}
              - _target_: fvcore.common.param_scheduler.CosineParamScheduler
                start_value: ${patch_mid_lr}
                end_value: ${patch_min_lr}
            lengths: [0.02, 0.18, 0.80]
            interval_scaling: ['rescaled', 'rescaled', 'rescaled']
          param_names:
            - '*patch_embed*'
      weight_decay:
        - scheduler:
            _target_: fvcore.common.param_scheduler.ConstantParamScheduler
            value: 0.05


#################
# Loss Configuration
#################
  loss:
    _target_: vggt.losses.loss.MultitaskLoss
    normalize_predictions: True
    normalization_type: "global"
    normalize_gt: "global"
    verbose: False
    intrinsics_warmup_ratio: 0.3
    rel_to_first_cam: False # Pi3 Does not use rel_to_first_cam to the predictions
    align_pred_to_gt: False 
    align_resolution: 8192
    mean_type: "geometric"
    camera:
      weight: 1.0
      weight_pairwise: 0.0
      loss_type: "l1_consistent"
      weight_trans: 1.0
      weight_rot: 1.0
      weight_focal: 1.0
      normalize_trans_by_gt_scale: True
      pose_encoding_type: "absT_quaR_FoV"
    depth:
      weight: 1.0
      weight_normal: 0.05
      abs_l1_loss_ratio: 2.0
      rel_l1_loss_ratio: 0.2
      use_conf_loss: True
      conf_alpha: 0.1
      # use_gt_var_weighting: True
      # valid_range: 0.99
      gradient_loss_config:
        - type: "normal"
          scales: 3
          weight: 0.1
        - type: "edge_aware"
          scales: 1
          weight: 1.0
        - type: "grad"
          scales: 5
        - type: "lap"
          scales: 3
          weight: 0.5
    point:
      weight: 0.1
      weight_normal: 0.05
      abs_l1_loss_ratio: 2.0
      rel_l1_loss_ratio: 0.2
      use_conf_loss: True
      # valid_range: 0.99
      detach_conf_for_loss: True
      gradient_loss_config:
        - type: "normal"
          scales: 3
          weight: 0.1
    preg: null
      # weight: 0.1
      # valid_range: 0.99
    track: null
      # weight: 1.0
      # weight: 1.0  
      # valid_range: 0.99
    mask: null
    ray: null
    match: null

#################
# Data Loading
#################
  data:
    train:
      _target_: vggt.data.dynamic_dataloader.DynamicTorchDataset
      num_workers: ${num_workers}
      use_spawn: ${use_spawn}
      dyna_ratio: ${dyna_ratio}
      sync_image_num: False
      sync_node: False
      persistent_workers: False
      reuse_dataloader: False
      seed: ${seed_value}
      shuffle: ${shuffle}
      pin_memory: True
      common_config:
        sample_dict: "s1"
        ratio_dict: "s1"
        img_size: ${img_size}
        patch_size: ${patch_size}
        debug: ${debug}
        repeat_batch: False
        img_nums: [2, 24]
        aug_principal_point: True
        random_rotation_ratio: 0.02
        random_patch_mask_size: 32
        random_patch_mask_ratio: -1
        load_track: ${load_track}
        track_num: ${track_num}
        load_similarity: ${load_similarity}
        synt_ratio: ${synt_ratio}
        load_ray_map: False
        thread_io_worker_num: -1
        # rescale_prob: 0.9
        augs:
          enable_image_aug: True # True
          aspects: [1.0, 1.0]
          cojitter_ratio: 0.6
          jpeg_compression: 0.4
          low_res_blur: 0.4
          color_jitter:
            brightness: 0.75
            contrast: 0.75
            saturation: 0.5
            hue: 0.1
            p: 0.9
        compute_invalid_area: True
        adaptive_step_range: True
        adaptive_step_range_base: 8
        joint_step_ratio: 0.5
        skip_extreme_rescale: False # DO NOT use skip_extreme_rescale any more
        # avoid_upsample: True # Instead, we use avoid_upsample to prevent upsampling
      dataset:
        _target_: vggt.data.composed_dataset.ComposedDataset
    val:
      _target_: vggt.data.dynamic_dataloader.DynamicTorchDataset
      num_workers: ${num_workers}
      sync_image_num: False
      use_spawn: ${use_spawn}
      shuffle: ${shuffle}
      pin_memory: True
      seed: ${seed_value}
      common_config:
        sample_dict: "s1"
        ratio_dict: "s1"
        img_size: ${img_size}
        patch_size: ${patch_size}
        debug: ${debug}
        load_track: ${load_track}
        track_num: ${track_num}
        load_similarity: ${load_similarity}
        synt_ratio: ${synt_ratio}
        load_ray_map: False
        thread_io_worker_num: -1
        compute_invalid_area: True
        adaptive_step_range: True
        adaptive_step_range_base: 8
        joint_step_ratio: 0.5
        skip_extreme_rescale: False # DO NOT use skip_extreme_rescale any more
        # avoid_upsample: True # Instead, we use avoid_upsample to prevent upsampling
      dataset:
        _target_: vggt.data.composed_dataset.ComposedDataset


  logging:
    scalar_keys_to_log:
      train:
        keys_to_log:
          - loss_obj
          - mean_depth_raw
          # Camera
          - loss_camera
          - loss_T
          - loss_R
          - loss_FL
          - loss_PP
          - loss_VP
          - loss_PW
          - pred_T_max
          # Camera Metrics
          - Rac_5
          - Rac_15
          - Tac_5
          - Tac_15
          - Auc_3
          - Auc_5
          - Auc_10
          - Auc_30
          # Depth
          - loss_depth
          - loss_pts_l1
          - loss_pts_l1_max
          - loss_normal
          - loss_conf_depth
          - depth_conf_median
          # Depth Metrics
          - d1
          - d2
          - d3
          - abs_rel
          - sq_rel
          - rmse
          - rmse_log
          # Mask
          - loss_mask
          - mask_pos_ratio
          # Point
          - loss_point
          - loss_point_l1
          - loss_point_l1_max
          - loss_point_normal
          # Point Reg
          - loss_preg
          - loss_preg_l1
          - loss_preg_l1_max
          - loss_preg_normal
          # Consistency
          - loss_consistency
          - loss_consistency_max
          - consistency_valid_count
      val:
        keys_to_log:
          - loss_obj
          - mean_depth_raw
          # Camera
          - loss_camera
          - loss_T
          - loss_R
          - loss_FL
          - loss_PP
          - loss_VP
          - loss_PW
          - pred_T_max
          # Camera Metrics
          - Rac_5
          - Rac_15
          - Tac_5
          - Tac_15
          - Auc_3
          - Auc_5
          - Auc_10
          - Auc_30
          # Depth
          - loss_depth
          - loss_pts_l1
          - loss_pts_l1_max
          - loss_normal
          - loss_conf_depth
          - depth_conf_median
          # Depth Metrics
          - d1
          - d2
          - d3
          - abs_rel
          - sq_rel
          - rmse
          - rmse_log
          # Mask
          - loss_mask
          - mask_pos_ratio
          # Point
          - loss_point
          - loss_point_l1
          - loss_point_l1_max
          - loss_point_normal
          # Point Reg
          - loss_preg
          - loss_preg_l1
          - loss_preg_l1_max
          - loss_preg_normal
          # Consistency
          - loss_consistency
          - loss_consistency_max
          - consistency_valid_count
