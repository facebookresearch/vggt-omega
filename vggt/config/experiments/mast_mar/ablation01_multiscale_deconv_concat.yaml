# @package _global_
#

defaults:
  - /experiments/mast/ablation00_single_lastlayer
  - _self_


trainer:
  model:
    DEPTH_HEAD:
      # DPT-like 4-level feature aggregation, implemented by VGGLinearHead multiscale path.
      intermediate_layer_idx: [4, 11, 17, 23]
      multiscale_out_channels: [256, 512, 1024, 1024]
      multiscale_upsample_factor: 4
      multiscale_resize_type: "deconv"
      multiscale_merge_type: "concat"
      multiscale_norm_type: "shared"
