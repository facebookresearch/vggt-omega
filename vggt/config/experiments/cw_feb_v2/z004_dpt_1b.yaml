# @package _global_
#


defaults:
  - /experiments/base/base_train
  - /experiments/models_v2/vggt_1b@trainer.model
  - /experiments/cw/dataset_mix_v5
  - /experiments/base/base_fsdp
  # - /experiments/cw/datasets/overfit@trainer.data.train.dataset.dataset_configs.overfit
  # - /experiments/cw/datasets/overfit@trainer.data.val.dataset.dataset_configs.overfit


#################
# Global Variables
#################
use_spawn: True
debug: False
img_size: 512
patch_size: 16
num_workers: 10
load_track: True
load_similarity: False
track_num: 512
shuffle: True
seed_value: 691096

base_lr: 5e-5
min_lr: 1e-9
patch_base_lr: 2.5e-6
patch_min_lr: 5e-11
dyna_ratio: 1.5
aggregator_register_num: 8


#################
# Submitit Configuration
#################
submitit:
  name: "z004_dpt"
  timeout_min: 8000
  cpus_per_task: 12
  account: "fair_amaia_cw_explore"
  qos: "explore"
  mem_gb: 0
  use_cluster: True
  partition: learn


#################
# Launcher Configuration
#################
launcher:
  gpus_per_node: 8
  num_nodes: 16


#################
# Trainer Configuration
#################
trainer:
  model:
    AGGREGATOR:
      use_flash_attn: True
  

    CAMERA_HEAD:
      _target_: vggt.models.heads.camera_head_linear.CameraHeadLinear
      dim_in: 2048
      pose_encoding_type: "absT_quaR_FoV"
      mlp_ratio: [0.5]
      patch_size: ${patch_size}
      extra_attention_depth: 4
      use_checkpoint: False
      disable_last_layer_amp: True


    DEPTH_HEAD:
      _target_: vggt.models.heads.dpt_head.DPTHead
      dim_in: 2048
      output_dim: 2
      activation: "exp"
      conf_activation: "softplus_0.5_10"
      patch_size: ${patch_size}
      features: 256
      out_channels: [256, 512, 1024, 1024]
      intermediate_layer_idx: [4, 11, 17, 23]
      pos_embed: False
      predict_mask: True
      mask_activation: "none"


    POINT_HEAD: null
    RAY_HEAD: null
    MATCH_HEAD: null

  cuda:
    allow_tf32: False
    cudnn_deterministic: False
    cudnn_benchmark: False

  fsdp_settings:
    fp32_module_name_patterns:
      - "*depth_head*"
      - "*_head.pose_branch*"
      - "*_head.token_norm*"
      - "*_head.norm*"
      - "*_head.proj*"



  checkpoint:
    model_weight_initializer:
      _partial_: True
      _target_: omnivision.model.checkpoint_utils.load_state_dict_into_model
      strict: False
      state_dict:
        _target_: omnivision.model.checkpoint_utils.load_multiple_checkpoints_and_apply_kernels
        checkpoints:
          - checkpoint_path: /checkpoint/amaia/explore/jianyuan/vggt/config/experiments/cw/Full_1b_d015_5e5_t2.yaml/0/checkpoints/checkpoint_ab_e98.pt
            ckpt_state_dict_keys:
            - model
            checkpoint_kernels:
              - _target_: omnivision.model.checkpoint_utils.CkptExcludeKernel
                key_pattern:
                  - "*head*"




  accum_steps: 1
  visual_viser: False
  val_epoch_freq: 10
  seed_value: ${seed_value}

  max_epochs: 60
  limit_train_batches: 1000
  limit_val_batches: 100

  optim:

    filter_bias_and_bn: True
    optimizer:
      _target_: torch.optim.AdamW
      lr: ${base_lr}
      weight_decay: 0.05
      betas: [0.9, 0.95]

    amp:
      enabled: True


    frozen_module_names:
      - "*patch_embed*"
      - "*aggregator*"

    gradient_clip:
      _target_: vggt.utils.gradient_clip.GradientClipper
      configs:
        - module_name: ["aggregator", "head", "patch_embed"]
          max_norm: 1.0
          norm_type: 2

    options:
      lr:
        # Main learning rate schedule:
        # 0-5%: linear warmup, 5%-100%: cosine decay
        - scheduler:
            _target_: fvcore.common.param_scheduler.CompositeParamScheduler
            schedulers:
              - _target_: fvcore.common.param_scheduler.LinearParamScheduler
                start_value: ${min_lr}
                end_value: ${base_lr}
              - _target_: fvcore.common.param_scheduler.CosineParamScheduler
                start_value: ${base_lr}
                end_value: ${min_lr}
            lengths: [0.05, 0.95]
            interval_scaling: ['rescaled', 'rescaled']
        # Patch embed learning rate schedule (0.05x of main)
        - scheduler:
            _target_: fvcore.common.param_scheduler.CompositeParamScheduler
            schedulers:
              - _target_: fvcore.common.param_scheduler.LinearParamScheduler
                start_value: ${patch_min_lr}
                end_value: ${patch_base_lr}
              - _target_: fvcore.common.param_scheduler.CosineParamScheduler
                start_value: ${patch_base_lr}
                end_value: ${patch_min_lr}
            lengths: [0.05, 0.95]
            interval_scaling: ['rescaled', 'rescaled']
          param_names:
            - '*patch_embed*'
      weight_decay:
        - scheduler:
            _target_: fvcore.common.param_scheduler.ConstantParamScheduler
            value: 0.05


#################
# Loss Configuration
#################
  loss:
    _target_: vggt.losses.loss.MultitaskLoss
    normalize_predictions: True
    normalization_type: "global"
    normalize_gt: "global"
    verbose: False
    intrinsics_warmup_ratio: 0.5
    rel_to_first_cam: False # Pi3 Does not use rel_to_first_cam to the predictions
    align_pred_to_gt: False 
    align_resolution: 8192
    mean_type: "geometric"
    camera:
      weight: 1.0
      weight_pairwise: 0.0
      loss_type: "l1_consistent"
      weight_trans: 1.0
      weight_rot: 1.0
      weight_focal: 1.0
      normalize_trans_by_gt_scale: True
      pose_encoding_type: "absT_quaR_FoV"
    depth:
      weight: 1.0
      weight_normal: 0.5
      abs_l1_loss_ratio: 1.0
      use_conf_loss: True
      conf_alpha: 0.1
      # use_gt_var_weighting: True
      # valid_range: 0.99
      gradient_loss_config:
        - type: "normal"
          scales: 3
          weight: 0.1
        # - type: "edge_aware"
        #   scales: 1
        #   weight: 1.0
        - type: "grad"
          scales: 5
        # - type: "lap"
        #   scales: 3
        #   weight: 0.5
    point:
      weight: 0.1
      weight_normal: 0.5
      abs_l1_loss_ratio: 1.0
      use_conf_loss: True
      # valid_range: 0.99
      detach_conf_for_loss: True
      gradient_loss_config:
        - type: "normal"
          scales: 3
          weight: 0.1
    preg: null
      # valid_range: 0.99
    track:
      weight: 1.0
      # weight: 1.0  
      # valid_range: 0.99
    mask: 
      weight: 0.5
      loss_type: "bce"
    ray: null
    match: null

#################
# Data Loading
#################
  data:
    train:
      _target_: vggt.data.dynamic_dataloader.DynamicTorchDataset
      num_workers: ${num_workers}
      use_spawn: ${use_spawn}
      dyna_ratio: ${dyna_ratio}
      sync_image_num: False
      sync_node: False
      persistent_workers: False
      reuse_dataloader: False
      seed: ${seed_value}
      shuffle: ${shuffle}
      pin_memory: True
      common_config:
        sample_dict: "s1"
        ratio_dict: "s1"
        img_size: ${img_size}
        patch_size: ${patch_size}
        debug: ${debug}
        repeat_batch: False
        img_nums: [2, 24]
        aug_principal_point: True
        random_rotation_ratio: 0.02
        random_patch_mask_size: 32
        random_patch_mask_ratio: -1
        load_track: ${load_track}
        track_num: ${track_num}
        load_similarity: ${load_similarity}
        load_ray_map: False
        thread_io_worker_num: -1
        # rescale_prob: 0.9
        augs:
          enable_image_aug: True # True
          aspects: [0.5, 2.0]
          cojitter_ratio: 0.6
          jpeg_compression: 0.4
          low_res_blur: 0.4
          color_jitter:
            brightness: 0.75
            contrast: 0.75
            saturation: 0.5
            hue: 0.1
            p: 0.9
        compute_invalid_area: True
        adaptive_step_range: True
        adaptive_step_range_base: 8
        # joint_step_ratio: 0.5
        skip_extreme_rescale: False # DO NOT use skip_extreme_rescale any more
        # avoid_upsample: True # Instead, we use avoid_upsample to prevent upsampling
      dataset:
        _target_: vggt.data.composed_dataset.ComposedDataset
    val:
      _target_: vggt.data.dynamic_dataloader.DynamicTorchDataset
      num_workers: ${num_workers}
      sync_image_num: False
      use_spawn: ${use_spawn}
      shuffle: ${shuffle}
      pin_memory: True
      seed: ${seed_value}
      common_config:
        sample_dict: "s1"
        ratio_dict: "s1"
        img_size: ${img_size}
        patch_size: ${patch_size}
        debug: ${debug}
        load_track: ${load_track}
        track_num: ${track_num}
        load_similarity: ${load_similarity}
        load_ray_map: False
        thread_io_worker_num: -1
        compute_invalid_area: True
        adaptive_step_range: True
        adaptive_step_range_base: 8
        # joint_step_ratio: 0.5
        skip_extreme_rescale: False # DO NOT use skip_extreme_rescale any more
        # avoid_upsample: True # Instead, we use avoid_upsample to prevent upsampling
      dataset:
        _target_: vggt.data.composed_dataset.ComposedDataset


  logging:
    scalar_keys_to_log:
      train:
        keys_to_log:
          - loss_obj
          - mean_depth_raw
          # Camera
          - loss_camera
          - loss_T
          - loss_R
          - loss_FL
          - loss_PP
          - loss_VP
          - loss_PW
          - pred_T_max
          # Camera Metrics
          - Rac_5
          - Rac_15
          - Tac_5
          - Tac_15
          - Auc_3
          - Auc_5
          - Auc_10
          - Auc_30
          # Depth
          - loss_depth
          - loss_pts_l1
          - loss_pts_l1_max
          - loss_normal
          - loss_conf_depth
          - depth_conf_median
          # Depth Metrics
          - d1
          - d2
          - d3
          - abs_rel
          - sq_rel
          - rmse
          - rmse_log
          # Mask
          - loss_mask
          - mask_pos_ratio
          # Point
          - loss_point
          - loss_point_l1
          - loss_point_l1_max
          - loss_point_normal
          # Point Reg
          - loss_preg
          - loss_preg_l1
          - loss_preg_l1_max
          - loss_preg_normal
          # Consistency
          - loss_consistency
          - loss_consistency_max
          - consistency_valid_count
      val:
        keys_to_log:
          - loss_obj
          - mean_depth_raw
          # Camera
          - loss_camera
          - loss_T
          - loss_R
          - loss_FL
          - loss_PP
          - loss_VP
          - loss_PW
          - pred_T_max
          # Camera Metrics
          - Rac_5
          - Rac_15
          - Tac_5
          - Tac_15
          - Auc_3
          - Auc_5
          - Auc_10
          - Auc_30
          # Depth
          - loss_depth
          - loss_pts_l1
          - loss_pts_l1_max
          - loss_normal
          - loss_conf_depth
          - depth_conf_median
          # Depth Metrics
          - d1
          - d2
          - d3
          - abs_rel
          - sq_rel
          - rmse
          - rmse_log
          # Mask
          - loss_mask
          - mask_pos_ratio
          # Point
          - loss_point
          - loss_point_l1
          - loss_point_l1_max
          - loss_point_normal
          # Point Reg
          - loss_preg
          - loss_preg_l1
          - loss_preg_l1_max
          - loss_preg_normal
          # Consistency
          - loss_consistency
          - loss_consistency_max
          - consistency_valid_count

