# @package _global_

defaults:
  - /experiments/base/base_v0

launcher:
  gpus_per_node: 8
  num_nodes: 1

batch_size: 16
fix_img_num: 2
fix_aspect_ratio: 1.0
img_size: 512
fix_sample: True
patch_size: 16
num_workers: 12
load_track: False
load_depth: True
track_num: 512

trainer:
  _target_: vggt.trainer.trainer.Trainer
  val_epoch_freq: 5
  max_epochs: 100 # 1400 epochs over the full data
  mode: train
  accelerator: cuda
  seed_value: 42

  limit_train_batches: 800
  limit_val_batches: 500


  # Template for the dataset config
  data:
    # The code still looks too complicated. I should refactor this again (do I have time?...)
    train:
      _target_: vggt.data.dynamic_dataloader.DynamicTorchDataset
      num_workers: 12
      max_img_per_gpu: 36
      # Shuffling in PyTorch DataLoader can sometimes copy large dicts and exceed CPU memory
      # (see: https://github.com/pytorch/pytorch/issues/13246).
      # To avoid this, set shuffle=False and enable common_config.inside_random=True instead.
      shuffle: False
      pin_memory: False
      common_config:  # common config for evaluation
        fix_img_num: -1 # -1 means do not fix the number of images
        fix_aspect_ratio: 1.0
        load_track: False
        track_num: 1024
        training: True
        inside_random: True
        img_size: 224
        patch_size: 14
        rescale: True
        rescale_aug: True
        landscape_check: False
        debug: False
        get_nearby: True
        load_depth: True
        img_nums: [2, 24]
        allow_duplicate_img: True
        repeat_batch: False
        aug_principal_point: False
        shared_intrinsics_resize_scale: False

        augs:
          cojitter: True
          cojitter_ratio: 0.5
          scales: [0.8, 1.2]
          # aspects: [0.33, 1.0]
          aspects: [1.0, 3.0] # match the original code
          color_jitter:
            brightness: 0.5
            contrast: 0.5
            saturation: 0.5
            hue: 0.1
            p: 0.9
          gray_scale: True
          gau_blur: False
    val:
      _target_: data.dynamic_dataloader.DynamicTorchDataset
      num_workers: 8
      max_img_per_gpu: 36
      # Shuffling in PyTorch DataLoader can sometimes copy large dicts and exceed CPU memory
      # (see: https://github.com/pytorch/pytorch/issues/13246).
      # To avoid this, set shuffle=False and enable common_config.inside_random=True instead.
      shuffle: False
      pin_memory: False
      common_config:  # common config for evaluation
        fix_img_num: -1 # -1 means do not fix the number of images
        fix_aspect_ratio: 1.0
        load_track: False
        track_num: 1024
        training: False
        inside_random: True
        img_size: 224
        patch_size: 14
        rescale: True
        rescale_aug: False
        landscape_check: False
        debug: False
        get_nearby: True
        load_depth: True
        img_nums: [2, 24]
        allow_duplicate_img: True
        aug_principal_point: False
        shared_intrinsics_resize_scale: False

        augs:
          cojitter: False
          cojitter_ratio: 0.5
          scales: null
          aspects: [1.0, 1.0]
          color_jitter: null
          gray_scale: False
          gau_blur: False

  distributed:
    backend: nccl
    find_unused_parameters: False

  optim:
    optimizer:
      _target_: torch.optim.AdamW
      lr: 1e-4
      weight_decay: 0.05

    amp:
      enabled: True

    gradient_clip:
      _target_: omnivore.optim.helpers.GradientClipper
      max_norm: 10.0
      norm_type: 2
    options:
      lr:
        - scheduler:
            _target_: fvcore.common.param_scheduler.CompositeParamScheduler
            schedulers:
              - _target_: fvcore.common.param_scheduler.LinearParamScheduler
                start_value: 1e-8
                end_value: 1e-4
              - _target_: fvcore.common.param_scheduler.CosineParamScheduler
                start_value: 1e-4
                end_value: 1e-8
            lengths: [0.05, 0.95]
            interval_scaling: ['rescaled', 'rescaled']
        - scheduler:
            _target_: fvcore.common.param_scheduler.CompositeParamScheduler
            schedulers:
              - _target_: fvcore.common.param_scheduler.LinearParamScheduler
                start_value: 1e-9
                end_value: 5e-6
              - _target_: fvcore.common.param_scheduler.CosineParamScheduler
                start_value: 5e-6
                end_value: 1e-9
            lengths: [0.05, 0.95]
            interval_scaling: ['rescaled', 'rescaled']
          param_names:
            - '*image_backbone*'
      weight_decay:
        - scheduler:
            _target_: fvcore.common.param_scheduler.ConstantParamScheduler
            value: 0.05

  meters: NULL


  loss:
    _target_: vggt.losses.loss.MultitaskLoss
    camera: 
      weight: 5.0
      loss_type: "l1" # The paper uses smooth l1 loss, but we found l1 loss is more stable than smooth l1 and l2 loss.  
    depth:
      weight: 1.0
      gradient_loss_fn: "grad" 
      # valid_range: 0.98
    point: null
    track: null   



  logging:
    log_freq: 1
    # log_level_secondary: "INFO"
    # all_ranks: True
    scalar_keys_to_log:
      train:
        keys_to_log:
          # Overall loss
          - loss_obj
          # Depth head
          - loss_depth
          - loss_conf_depth
          - loss_reg_depth
          - loss_grad_depth
          - loss_reg_relative_depth
          - d1
          - d2
          - d3
          - abs_rel
          - sq_rel
          - rmse
          - rmse_log
          - loss_depth_max
          - depth_conf_median
          # Mask head (invalid area prediction)
          - loss_mask
          # Point head
          - loss_point
          - loss_conf_point
          - loss_reg_point
          - loss_grad_point
          - loss_reg_relative_point
          - loss_point_max
          # # Point Reg head
          # - loss_preg
          # - loss_conf_preg
          # - loss_reg_preg
          # - loss_grad_preg
          # - loss_reg_relative_preg
          # - loss_preg_max
          # - preg_conf_median
          # Ray head
          - loss_ray
          # - loss_conf_ray
          # - loss_reg_ray
          # - loss_grad_ray
          # - loss_reg_relative_ray
          # Camera head
          - loss_camera
          - pred_T_max
          - loss_T
          - loss_R
          - loss_FL
          - loss_PP
          - loss_VP
          - loss_PW
          - Rac_5
          - Tac_5
          - Rac_15
          - Tac_15
          - Auc_30
          - Auc_10
          - Auc_5
          - Auc_3
          # Match head
          - loss_patch_bce
          - loss_patch_pos
          - loss_patch_neg
          - num_pos_pairs
          - num_neg_pairs
          # Consistency track loss
          - loss_consistency
          - loss_consistency_max
          - consistency_valid_count
          #  
          - mean_depth_raw
      val:
        keys_to_log:
          # Overall loss
          - loss_obj
          # Depth head
          - loss_depth
          - loss_conf_depth
          - loss_reg_depth
          - loss_grad_depth
          - loss_reg_relative_depth
          - d1
          - d2
          - d3
          - abs_rel
          - sq_rel
          - rmse
          - rmse_log
          - loss_depth_max
          - depth_conf_median
          # Mask head (invalid area prediction)
          - loss_mask
          # Point head
          - loss_point
          - loss_conf_point
          - loss_reg_point
          - loss_grad_point
          - loss_reg_relative_point
          - loss_point_max
          # # Point Reg head
          # - loss_preg
          # - loss_conf_preg
          # - loss_reg_preg
          # - loss_grad_preg
          # - loss_reg_relative_preg
          # - loss_preg_max
          # - preg_conf_median
          # Ray head
          - loss_ray
          # - loss_conf_ray
          # - loss_reg_ray
          # - loss_grad_ray
          # - loss_reg_relative_ray
          # Camera head
          - loss_camera
          - pred_T_max
          - loss_T
          - loss_R
          - loss_FL
          - loss_PP
          - loss_VP
          - loss_PW
          - Rac_5
          - Tac_5
          - Rac_15
          - Tac_15
          - Auc_30
          - Auc_10
          - Auc_5
          - Auc_3
          # Match head
          - loss_patch_bce
          - loss_patch_pos
          - loss_patch_neg
          - num_pos_pairs
          - num_neg_pairs
          # Consistency track loss
          - loss_consistency
          - loss_consistency_max
          - consistency_valid_count
          # 
          - mean_depth_raw
    log_visuals: True
    log_visual_frequency:
      train: 500 # 500  # TEMP
      val: 200
    visuals_per_batch_to_log: 4
    visuals_image_range:
      - 0.0
      - 1.0
    visuals_keys_to_log:
      train:
        keys_to_log:
          - images  # rendered rgb
          - patch_similarity  # patch correspondence visualization
          - pred_depth_vis  # predicted depth (scale-consistent across sequence)
          - gt_depth_vis  # ground truth depth (scale-consistent across sequence)
          - invalid_area_masks_vis  # ground truth invalid area mask (red=invalid, green=valid)
          - pred_depth_mask_vis  # predicted invalid area mask (colormap visualization)
          - images_track  # track visualization
        modality: image
      val:
        keys_to_log:
          - images  # rendered rgb
          - patch_similarity  # patch correspondence visualization
          - pred_depth_vis  # predicted depth (scale-consistent across sequence)
          - gt_depth_vis  # ground truth depth (scale-consistent across sequence)
          - invalid_area_masks_vis  # ground truth invalid area mask (red=invalid, green=valid)
          - pred_depth_mask_vis  # predicted invalid area mask (colormap visualization)
          - images_track  # track visualization
        modality: image


